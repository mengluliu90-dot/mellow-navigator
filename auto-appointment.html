<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#1e1e24"><link rel="icon" href="mellow-icon.svg"><link rel="apple-touch-icon" href="mellow-icon.svg"><title>Auto Appointment Mode</title><style>:root{--bg:#1e1e24;--text:#f5f5f7;--red:#3a1c1c;--orange:#3a2a1c;--purple:#2d1c3a;--blue:#1c283a;--green:#1c3a26;--panel:#2a2a35}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;background:var(--panel);padding:10px}.controls button{font-size:17px;font-weight:700;border:0;border-radius:14px;padding:14px 8px;color:#fff;background:#35598f}.controls .exit{background:#555}.controls .danger{background:#8b1e1e}.screen{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px;transition:background-color .3s ease}.text{font-size:clamp(1.75rem,7vw,3.4rem);line-height:1.38;font-weight:800;max-width:900px}.caption{font-size:clamp(1rem,4vw,1.45rem);line-height:1.35;margin-top:18px;color:#ddd}.barbox{height:12px;background:#333}.bar{height:100%;width:0;background:#fff}.small{font-size:14px;color:#ddd;text-align:center;background:#202028;padding:6px 10px}@media(max-width:360px){.controls button{font-size:14px;padding:12px 5px}.text{font-size:1.55rem}}</style></head><body><div class="controls"><button class="exit" onclick="exitMode()">返回 / Exit</button><button id="pauseBtn" onclick="togglePause()">暂停 / Pause</button><button class="danger" onclick="showEmergency()">急救 / Emergency</button></div><div class="screen" id="screen"><div><div class="text" id="mainText">Loading...</div><div class="caption" id="subText"></div></div></div><div class="barbox"><div class="bar" id="bar"></div></div><div class="small">Show this screen to staff. It is not a replacement for 999 in a life-threatening emergency.</div><script>const mumPhone='07909414213';const slides=[{bg:'var(--red)',dur:9000,en:'EMERGENCY: I have autism and POTS. If I faint, go pale, collapse or become floppy, please do not force me upright. Please help me lie flat, raise my legs if safe, reduce stimulation, and contact my mother.',zh:'紧急情况：我有自闭症和 POTS。如果我晕倒、脸色苍白、瘫软，请不要强行扶我坐起。请让我平躺，安全时抬高双腿，减少刺激，并联系我妈妈。'},{bg:'var(--orange)',dur:8000,en:'COMMUNICATION: I may be non-speaking or in severe brain fog. I may not be able to answer verbally or make complex decisions. Please use very simple written information, one question at a time.',zh:'沟通提示：我可能处于非言语或严重脑雾状态，无法口头回答或做复杂决定。请使用非常简单的书面信息，一次只问一个问题。'},{bg:'var(--purple)',dur:8000,en:'ALLERGIES: Do not use Duac Once Daily Gel, benzoyl peroxide plus clindamycin phosphate. Allergies also include pollen, onions, shellfish and oysters.',zh:'过敏提示：禁止使用 Duac Once Daily Gel（过氧苯甲酰 + 克林霉素）。我也对花粉、洋葱、贝类和生蚝过敏。'},{bg:'var(--blue)',dur:10000,en:'HEALTH BACKGROUND: Autism, POTS, ME/CFS or chronic fatigue with post-exertional worsening, hypermobility with suspected hEDS/HSD, anxiety, suspected PTSD, IBS, TMJ, burning mouth and thyroid nodule surveillance.',zh:'基础病史：自闭症、POTS、ME/CFS或慢性疲劳和活动后恶化、关节过度活动疑似 hEDS/HSD、焦虑、疑似 PTSD、IBS、TMJ、灼口综合征、甲状腺结节随访。'},{bg:'var(--green)',dur:8500,en:'CURRENT MEDICATIONS: Dymista nasal spray, Gaviscon, Chinese medicine for PMS, and paracetamol as needed. Emergency contact: mother, Kun Shi. Phone: '+mumPhone+'.',zh:'当前用药：Dymista 鼻喷剂、Gaviscon、经前期中药、需要时服用扑热息痛。紧急联系人：妈妈 Kun Shi，电话：'+mumPhone+'。'}];let i=0,paused=false,timer=null,prog=null,wakeLock=null,lang='en';function show(){if(paused)return;let s=slides[i];screen.style.backgroundColor=s.bg;mainText.textContent=lang==='en'?s.en:s.zh;subText.textContent=lang==='en'?s.zh:s.en;speak(mainText.textContent);let start=Date.now();clearInterval(prog);prog=setInterval(()=>{if(!paused){bar.style.width=Math.min(100,(Date.now()-start)/s.dur*100)+'%'}},100);clearTimeout(timer);timer=setTimeout(()=>{i=(i+1)%slides.length;show()},s.dur)}function speak(t){if(!('speechSynthesis'in window))return;speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t.replace(/[⚠️💬🚫🩺📞]/g,''));u.lang=lang==='en'?'en-GB':'zh-CN';u.rate=.75;speechSynthesis.speak(u)}function togglePause(){paused=!paused;pauseBtn.textContent=paused?'继续 / Continue':'暂停 / Pause';if(paused){clearTimeout(timer);speechSynthesis?.cancel()}else show()}function showEmergency(){i=0;paused=false;show()}function exitMode(){speechSynthesis?.cancel();location.href='./'}async function lock(){try{if('wakeLock'in navigator)wakeLock=await navigator.wakeLock.request('screen')}catch(e){}}document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')lock()});lock();show();setInterval(()=>{lang=lang==='en'?'zh':'en'},60000);</script></body></html>
