<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#f5f7fb"><title>Mira Next</title><style>:root{--bg:#f5f7fb;--card:#fff;--line:#d7d7d7;--accent:#1f4f8f;--danger:#a40000;--soft:#eef3fb}*{box-sizing:border-box}body{font-family:Arial,sans-serif;background:var(--bg);color:#111;margin:0;padding:14px;max-width:760px}h1,h2,h3{margin:8px 0}.top{display:flex;justify-content:space-between;align-items:center}.ver{font-size:13px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:6px 9px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;margin:10px 0}.soft{background:var(--soft)}button{width:100%;font-size:18px;line-height:1.25;padding:14px;margin:5px 0;border:1px solid #bbb;border-radius:14px;background:#fff;text-align:left}button.primary{border-color:var(--accent);font-weight:700}button.danger{border:2px solid var(--danger)}input,textarea,select{width:100%;font-size:18px;padding:12px;margin:6px 0 12px;border:1px solid #aaa;border-radius:10px;background:#fff}.out{white-space:pre-wrap;font-size:18px;line-height:1.45}.small{font-size:15px;color:#555;line-height:1.35}.row{display:flex;gap:8px}.row button{flex:1}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}.grid button{margin:0;min-height:58px}.section-title{font-weight:700;margin-top:14px;margin-bottom:4px}.pill{display:inline-block;padding:5px 8px;border:1px solid #ccd;border-radius:999px;margin:3px;background:#fff;font-size:14px}@media(max-width:360px){.grid{grid-template-columns:1fr}button{font-size:17px}}</style></head><body><div class="top"><h1>Mira Next</h1><span class="ver">beta</span></div><main id="app"></main><script src="app.js"></script></body></html>
