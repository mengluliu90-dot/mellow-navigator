<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mira</title><style>body{font-family:Arial,sans-serif;background:#f5f7fb;color:#111;margin:0;padding:16px}button{width:100%;font-size:20px;padding:16px;margin:7px 0;border:1px solid #bbb;border-radius:14px;background:#fff;text-align:left}.danger{border:2px solid #a40000}.screen{display:none}.active{display:block}textarea,input,select{width:100%;font-size:18px;padding:12px;margin:6px 0 12px;box-sizing:border-box}.card{background:#fff;border:1px solid #ddd;border-radius:14px;padding:14px;margin:10px 0}.out{white-space:pre-wrap;font-size:18px;line-height:1.45}.small{font-size:15px;color:#444}</style></head><body><h1>Mira</h1><div id="home" class="screen active"><button onclick="show('speak')">🗣 Speak / AAC</button><button onclick="show('appt')">📅 Appointment Mode</button><button onclick="show('end')">🏁 End Appointment</button><button onclick="show('adv')">🛡 AI Advocate Prompt</button><button onclick="show('timeline')">📝 Evidence Timeline</button><button class="danger" onclick="show('emg')">🆘 Emergency</button><button onclick="show('settings')">⚙ Settings</button></div><div id="speak" class="screen"><h2>Speak / AAC</h2><button onclick="say('Hello. My name is '+profile.name+'. I may need support with communication.')">▶️ Short introduction</button><button onclick="say('Please give me extra time to process information. Please ask one question at a time.')">▶️ Processing time</button><button onclick="say('Written information is easier for me. Please write down important information and next steps.')">▶️ Written information</button><button onclick="say('I cannot speak right now. Please give me time and use written communication.')">▶️ I cannot speak</button><button onclick="say('Please do not phone me. Please use email or written communication where possible.')">▶️ No phone calls</button><button onclick="show('family')">中文 Family</button><button onclick="show('home')">⬅ Back</button></div><div id="family" class="screen"><h2>中文</h2><button onclick="say('我现在说话和组织语言比较困难。请慢一点，一次说一件事。','zh-CN')">▶️ 我现在说话困难</button><button onclick="say('我需要安静休息。请不要连续追问。','zh-CN')">▶️ 我需要休息</button><button onclick="say('我头晕，可能需要坐下或躺下。','zh-CN')">▶️ 我头晕</button><button onclick="show('speak')">⬅ Back</button></div><div id="appt" class="screen"><h2>Appointment Mode</h2><label>Type</label><select id="t"><option>Healthcare</option><option>Benefits / welfare</option><option>Social care</option><option>Housing</option><option>Banking</option><option>Government</option><option>Education</option><option>Other</option></select><label>Person or service</label><input id="who"><label>Time</label><input id="time"><label>Location</label><input id="loc"><label>Reason or notes</label><textarea id="why" rows="4"></textarea><button onclick="genAppt()">Generate language</button><div id="apptout" class="card out"></div><button onclick="speakOut('apptout')">▶️ Speak</button><button onclick="copy('apptout')">📋 Copy</button><button onclick="show('home')">⬅ Back</button></div><div id="end" class="screen"><h2>End Appointment</h2><button onclick="say('Before I leave, could you please summarise what we discussed today in plain language?')">▶️ Plain summary</button><button onclick="say('Could you please provide Easy Read information or a short written summary where possible?')">▶️ Easy Read</button><button onclick="say('Could you please write down the next steps, who is responsible, and when I should expect to hear back?')">▶️ Next steps</button><button onclick="say('Could you please confirm if anything needs to be sent, signed, booked, chased, or reviewed?')">▶️ Anything else needed</button><button onclick="show('post')">📝 After appointment summary</button><button onclick="show('home')">⬅ Back</button></div><div id="post" class="screen"><h2>After Appointment Summary</h2><textarea id="notes" rows="6" placeholder="Type or dictate short notes."></textarea><button onclick="genSummary()">Generate ChatGPT prompt</button><div id="sumout" class="card out"></div><button onclick="copy('sumout')">📋 Copy</button><button onclick="show('home')">⬅ Back</button></div><div id="adv" class="screen"><h2>AI Advocate Prompt</h2><textarea id="prob" rows="6" placeholder="What happened? What do you need help with?"></textarea><button onclick="genAdv()">Generate advocate prompt</button><div id="advout" class="card out"></div><button onclick="copy('advout')">📋 Copy</button><button onclick="show('home')">⬅ Back</button></div><div id="timeline" class="screen"><h2>Evidence Timeline</h2><button onclick="quick('Appointment or outing')">➕ Appointment or outing</button><button onclick="quick('Crash or recovery day')">➕ Crash or recovery day</button><button onclick="quick('Communication difficulty')">➕ Communication difficulty</button><button onclick="quick('Support needed')">➕ Support needed</button><div id="tout" class="card out"></div><button onclick="copy('tout')">📋 Copy</button><button onclick="show('home')">⬅ Back</button></div><div id="emg" class="screen"><h2>Emergency</h2><button class="danger" onclick="say('I cannot speak right now. Please give me time and use written communication.')">▶️ I cannot speak</button><button onclick="say('I feel unwell and may need to sit or lie down safely.')">▶️ I feel unwell</button><button onclick="say('Please reduce noise, lights, questions, and pressure. I need a quiet place.')">▶️ Reduce overload</button><button onclick="show('home')">⬅ Back</button></div><div id="settings" class="screen"><h2>Settings</h2><p class="small">This public version does not store private medical details. Your name is saved only on this device.</p><label>Your name</label><input id="name"><button onclick="saveName()">Save name</button><button onclick="show('home')">⬅ Back</button></div><script>let profile={name:localStorage.miraName||'Menglu'};document.getElementById('name').value=profile.name;function show(id){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active')}function say(t,l='en-GB'){let u=new SpeechSynthesisUtterance(t);u.lang=l;u.rate=.9;speechSynthesis.cancel();speechSynthesis.speak(u)}function v(id){return document.getElementById(id).value.trim()}function set(id,t){document.getElementById(id).textContent=t}function copy(id){navigator.clipboard.writeText(document.getElementById(id).textContent)}function speakOut(id){say(document.getElementById(id).textContent)}function saveName(){localStorage.miraName=v('name')||'Menglu';profile.name=localStorage.miraName;alert('Saved')}function genAppt(){let type=v('t'),who=v('who'),time=v('time'),loc=v('loc'),why=v('why');let s='Hello. My name is '+profile.name+'.\n\nI have an appointment'+(who?' with '+who:'')+(time?' at '+time:'')+(loc?' at '+loc:'')+'.\n\nI may need support with communication. Please speak slowly, ask one question at a time, and provide written information where possible.\n\n';if(why)s+='The reason for this appointment is:\n'+why+'\n\n';if(type.includes('Housing'))s+='Please confirm the repair or issue, responsibility, timescale, and written update route.';else if(type.includes('Banking'))s+='Please confirm any account, complaint, protection, refund, or next step in writing.';else if(type.includes('Benefits'))s+='Please confirm what evidence is needed, who is responsible, and the timescale in writing.';else s+='Please provide a short written summary of the plan and any next steps before I leave.';set('apptout',s)}function genSummary(){set('sumout','Please summarise these notes. Keep only new information. Create: 1. New information 2. Actions agreed 3. Who is responsible 4. Deadlines 5. Follow-up reminders 6. Timeline entry.\n\nNotes:\n'+v('notes'))}function genAdv(){set('advout','Act as my general AI advocate. Review the situation below. Identify risks, missing information, accessibility barriers, evidence needed, and safest next steps. Then draft clear wording I can use.\n\nSituation:\n'+v('prob'))}function quick(label){set('tout','Timeline entry\nDate/time: '+new Date().toLocaleString('en-GB')+'\nType: '+label+'\nNotes: ')}</script></body></html>
