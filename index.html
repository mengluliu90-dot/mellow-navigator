<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#eaf6ff"><link rel="manifest" href="manifest.json"><link rel="icon" href="mellow-icon.svg"><link rel="apple-touch-icon" href="mellow-icon.svg"><title>Mellow Navigator</title><style>:root{--blue:#2457a6;--red:#b91c1c;--green:#166534;--purple:#6d28d9;--line:#d9dcea;--soft:#eef7ff;--pink:#fff3f8}*{box-sizing:border-box}body{font-family:Arial,sans-serif;margin:0;padding:10px 10px 82px;background:linear-gradient(180deg,#f8fbff,#fff8fc);color:#111;max-width:920px}h1{font-size:22px;text-align:center;margin:4px 0 8px}.top{display:grid;grid-template-columns:1fr 1fr;gap:6px}.out{position:sticky;top:0;z-index:10;background:#e0f2fe;border:2px solid #0369a1;border-radius:14px;padding:10px;margin:8px 0;font-size:18px;font-weight:700;line-height:1.35}.nav{display:flex;gap:6px;overflow:auto;padding-bottom:6px}.nav button{min-width:96px;text-align:center}.section{font-size:18px;font-weight:700;margin:12px 0 6px}.section-card{background:rgba(255,255,255,.82);border:1px solid var(--line);border-radius:16px;padding:8px;margin:10px 0}.grid{display:grid;grid-auto-flow:column;grid-auto-columns:minmax(155px,1fr);grid-template-rows:repeat(3,auto);gap:7px;overflow:auto;padding-bottom:6px}.btn,button{font-size:15px;line-height:1.2;padding:10px;border-radius:13px;border:2px solid var(--blue);background:white;color:var(--blue);font-weight:700}.btn{min-height:72px;text-align:left}.btn small{display:block;color:#555;font-size:11px;margin-top:4px;font-weight:400;line-height:1.15}.red{border-color:var(--red);color:var(--red);background:#fff7f7}.green{border-color:var(--green);color:var(--green);background:#f4fff7}.purple{border-color:var(--purple);color:var(--purple);background:#fbf7ff}.hint{font-size:12px;color:#666;margin:0 0 4px}.bottom{position:fixed;bottom:0;left:0;right:0;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;background:rgba(255,255,255,.96);border-top:1px solid var(--line);padding:5px;max-width:920px;margin:auto}.bottom button{font-size:12px;text-align:center;padding:7px 2px;min-height:42px;border-radius:12px}@media(min-width:700px){.grid{grid-auto-flow:row;grid-template-columns:repeat(4,1fr);grid-template-rows:auto}.btn{min-height:78px}}@media(max-width:340px){.grid{grid-auto-columns:minmax(142px,72vw)}.btn,button{font-size:14px}}</style></head><body><h1>🐻 Mellow Navigator</h1><div class="top"><button onclick="unlockVoice()">🔓 Unlock Voice</button><button onclick="stopSpeech()">⏹ Stop</button></div><div class="out" id="spokenText">Ready. Tap Unlock Voice, then tap a card.</div><div class="nav"><button onclick="jump('critical')">⚠️ Flags</button><button onclick="jump('boundary')">🛡 Boundary</button><button onclick="jump('quick')">✅ Quick</button><button onclick="jump('intro')">🌸 Intro</button><button onclick="jump('medical')">🏥 Medical</button><button onclick="jump('emergency')">🆘 Urgent</button><button onclick="openMira()">✨ Mira</button></div><div id="content"></div><div class="bottom"><button onclick="jump('critical')">⚠️<br>Flags</button><button onclick="jump('boundary')">🛡<br>Boundary</button><button onclick="jump('intro')">🌸<br>Intro</button><button onclick="jump('medical')">🏥<br>Medical</button><button onclick="jump('emergency')">🆘<br>Urgent</button></div><script src="app-aac.js?v=20260626-2"></script></body></html>
