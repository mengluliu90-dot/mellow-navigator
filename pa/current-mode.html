<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Current Mode</title><style>body{font-family:Arial,sans-serif;margin:0 auto;max-width:760px;padding:14px 14px 90px;background:linear-gradient(180deg,#f8fbff,#fff8fc);color:#111827}.card{background:#fff;border:1px solid #ead7e6;border-radius:18px;padding:14px;margin:10px 0}.soft{background:linear-gradient(135deg,#eef7ff,#fff3f8)}button{width:100%;font-size:17px;padding:14px;border-radius:16px;border:2px solid #ddd;background:#fff;margin:6px 0;text-align:left}.green{border-color:#86efac;background:#f0fdf4}.yellow{border-color:#fde68a;background:#fffbeb}.orange{border-color:#fed7aa;background:#fff7ed}.red{border-color:#fecaca;background:#fef2f2}.out{font-size:18px;line-height:1.45;white-space:pre-wrap}.bottom{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(3,1fr);gap:4px;background:#fff;padding:6px;border-top:1px solid #ddd;max-width:760px;margin:auto}.bottom a{text-align:center;text-decoration:none;color:#315f9f;font-size:12px;padding:9px;border:1px solid #ddd;border-radius:12px}</style></head><body><h1>Current Mode</h1><div class="card soft"><b>Use this page to show today’s functional capacity quickly.</b><p>Press one button, then show the card to a professional.</p></div><div class="card"><button class="green" onclick="show('green')">🟢 Functional Day</button><button class="yellow" onclick="show('yellow')">🟡 Reduced Capacity</button><button class="orange" onclick="show('orange')">🟠 Recovery Mode</button><button class="red" onclick="show('red')">🔴 Shutdown / Very Low Capacity</button></div><div id="result" class="card soft out">Choose one mode.</div><button onclick="copyText()">Copy current mode text</button><script>const modes={green:'🟢 Current Mode: Functional Day\n\nRoutine activity is possible with pacing. Written communication is preferred. Please avoid extra demands unless necessary.\n\nSupport needed:\n- Allow extra processing time.\n- Keep information clear.\n- Avoid unexpected extra questions.',yellow:'🟡 Current Mode: Reduced Capacity\n\nEnergy, concentration, and processing are limited today. Please keep communication simple and use one topic at a time.\n\nSupport needed:\n- Short questions only.\n- Extra processing time.\n- Written summary where possible.\n- Avoid rapid decisions.',orange:'🟠 Current Mode: Recovery Mode\n\nI am in a low-energy recovery state. I may look calm but have reduced capacity. Please keep demands very low to prevent deterioration.\n\nSupport needed:\n- Essential questions only.\n- Allow pauses.\n- Do not expect quick decisions.\n- Recovery time is required after this.',red:'🔴 Current Mode: Shutdown / Very Low Capacity\n\nSpeech, processing, and sensory tolerance are very limited. Please use written communication where possible and ask one essential question at a time.\n\nSupport needed:\n- Essential communication only.\n- Do not pressure for immediate answers.\n- Reduce light, noise, crowding, and movement.\n- Non-urgent matters should be delayed.'};let current='';function show(k){current=modes[k];document.getElementById('result').textContent=current;try{localStorage.setItem('current_mode_text',current)}catch(e){}}function copyText(){navigator.clipboard&&navigator.clipboard.writeText(current||document.getElementById('result').textContent)}try{let s=localStorage.getItem('current_mode_text');if(s){current=s;document.getElementById('result').textContent=s}}catch(e){}</script><nav class="bottom"><a href="workflows.html">Workflows</a><a href="eos.html">EOS</a><a href="../">Mellow</a></nav></body></html>
