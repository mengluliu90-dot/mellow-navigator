<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#315f9f"><title>PA EOS Dashboard</title><style>:root{--bg:#f8fbff;--card:#fff;--line:#d9d8ee;--ink:#111;--blue:#315f9f;--red:#9b111e;--green:#166534;--soft:#eef7ff;--pink:#fff3f8}*{box-sizing:border-box}body{font-family:Arial,sans-serif;margin:0;background:linear-gradient(180deg,var(--bg),#fff8fc);color:var(--ink);padding:12px 12px 92px;max-width:760px}h1{font-size:24px;margin:4px 0}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;box-shadow:0 2px 10px rgba(49,95,159,.06)}.soft{background:linear-gradient(135deg,var(--soft),var(--pink))}.out{white-space:pre-wrap;font-size:17px;line-height:1.45}.small{font-size:14px;color:#555}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}button{width:100%;font-size:16px;line-height:1.22;padding:12px;border:1px solid #bbb;border-radius:15px;background:#fff;text-align:left;min-height:58px}button.primary{border:2px solid var(--blue);color:var(--blue);font-weight:700;background:#f4f9ff}button.danger{border:2px solid var(--red);color:var(--red);font-weight:700;background:#fff7f7}button.green{border:2px solid var(--green);color:var(--green);font-weight:700;background:#f4fff7}.bar{height:11px;border-radius:999px;background:#e5e7eb;overflow:hidden;margin:8px 0}.fill{height:100%;background:#315f9f}.bottom{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;background:rgba(255,255,255,.96);border-top:1px solid var(--line);padding:6px;max-width:760px;margin:auto}.bottom button{font-size:12px;text-align:center;padding:8px 2px;min-height:44px;border-radius:12px}@media(max-width:340px){.grid{grid-template-columns:1fr}}</style></head><body><h1>🧭 PA EOS Dashboard v2</h1><main id="app"></main><nav class="bottom"><button onclick="location.href='./'">🏠<br>PA</button><button onclick="showEOS()">🧭<br>EOS</button><button onclick="showCases()">🧠<br>Cases</button><button onclick="showRecovery()">🛡<br>Recovery</button></nav><script>
function jget(k,d){try{return JSON.parse(localStorage[k]||JSON.stringify(d))}catch(e){return d}}
function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function card(t,b,soft){let d=document.createElement('div');d.className='card '+(soft?'soft':'');d.innerHTML='<b>'+esc(t)+'</b><div class="out">'+esc(b||'')+'</div>';return d}
function btn(label,fn,cls){let b=document.createElement('button');b.className=cls||'';b.innerHTML=label;b.onclick=fn;return b}
function grid(items){let g=document.createElement('div');g.className='grid';items.forEach(i=>g.appendChild(btn(i[0],i[1],i[2])));return g}
function daysSince(date){let t=Date.parse(date||'');if(!t)return 0;return Math.floor((Date.now()-t)/86400000)}
function objects(){return jget('uos_objects',[])}function tasks(){return jget('uos_tasks',[])}function cases(){return jget('uos_cases',{})}function state(){return jget('uos_state',{mode:'HOME',recovery_until:0})}function latest(){return objects()[0]||jget('uos_last',null)}function recoveryActive(){return Number(state().recovery_until||0)>Date.now()}
function progress(n){let w=Math.max(0,Math.min(100,n||0));return '<div class="bar"><div class="fill" style="width:'+w+'%"></div></div>'}
function calcLoad(){let t=tasks(),load=t.filter(x=>x.status==='Needs Review').length*18+t.filter(x=>x.priority==='RED').length*25;if(recoveryActive())load+=35;return Math.min(100,load)}
function caseStatus(c){let wait=String(c.waiting_for||'').toLowerCase(),age=daysSince(c.updated);if(/no action|none/.test(wait))return'Complete / monitor';if(age>=30)return'Escalation review';if(age>=14)return'Chase soon';if(age>=7)return'Monitor';if(/external|waiting|reply|promise|referral|confirm/.test(wait))return'Waiting';return'Active'}
function eosText(){let c=Object.values(cases()),t=tasks(),objs=objects(),s=state(),rec=recoveryActive(),ready=t.filter(x=>x.status==='Needs Review'||x.priority==='RED'),waiting=t.filter(x=>x.status==='Waiting'||/wait|open loop|follow/i.test(x.title+' '+x.detail)),risks=t.filter(x=>x.priority==='RED'||/urgent|deadline|risk|phone/i.test(x.title+' '+x.detail)),complete=t.filter(x=>x.status==='Done'),activeCases=c.map(x=>(x.name||'Case')+': '+caseStatus(x)).slice(0,12).join('\n');return 'Capacity Summary\n'+(rec?'RECOVERY MODE — reduce admin.':'HOME MODE — one task only.')+'\n\nRecovery Monitor\n'+(rec?'Active until: '+new Date(Number(s.recovery_until||0)).toLocaleString():'No recovery block active')+'\n\nActive Cases\n'+(activeCases||'No active cases yet')+'\n\nWaiting for Responses\n'+waiting.length+' waiting/open-loop item(s)\n\nRisks\n'+(risks[0]?risks.map(x=>'- '+x.title).slice(0,5).join('\n'):'No high-risk task detected')+'\n\nRecommended Workload\n'+(ready[0]?'Review one item only: '+ready[0].title:'No review needed now')+'\n\nRecently Completed Actions\n'+(complete[0]?complete.slice(0,5).map(x=>'- '+x.title).join('\n'):'None logged')+'\n\nObjects stored\n'+objs.length}
function evidenceText(){let o=latest();if(!o)return'No PA object yet.';let raw=(o.raw||o.text||'').toLowerCase(),lines=[];lines.push('Latest: '+(o.event_type||'Object')+' → '+((o.caseNames||[]).join(' / ')||'General'));lines.push('Evidence value: '+(o.evidence_score||'?')+'/5');if(/pip|daily living|mobility|safe|repeatedly|support|prompting|supervision/.test(raw))lines.push('Supports PIP: likely yes.');if(/social care|support worker|care plan|daily living|coordination|follow up/.test(raw))lines.push('Supports Social Care: likely yes.');if(/nhs|gp|hospital|clinic|referral|diagnosis|symptom|pain|fatigue|pots|autism/.test(raw))lines.push('Supports healthcare evidence: likely yes.');if(/phone|call|telephone/.test(raw))lines.push('Accessibility issue: phone demand detected.');if(/cancel|refuse|no evidence|fit|independent|no need/.test(raw))lines.push('Possible contradiction/risk: review wording carefully.');if(lines.length===2)lines.push('No obvious contradiction detected.');return lines.join('\n')}
function recoveryText(){let s=state(),rec=recoveryActive(),t=tasks(),urgent=t.filter(x=>x.priority==='RED'||/deadline|urgent|risk/i.test(x.title+' '+x.detail)),optional=t.filter(x=>x.priority==='LOW'||x.status==='Hidden');if(rec)return'Recovery active.\n\nProtect recovery.\nShow only urgent/statutory items.\n\nUrgent visible: '+urgent.length+'\nOptional suppressed: '+optional.length+'\n\nOne safest action: '+((urgent[0]&&urgent[0].title)||'Rest / no admin now');return'Recovery not active.\n\nIf appointment, travel, hospital, dentist, social care or major admin happens today, start recovery protection.\n\nOne safest action: process only one item.'}
function caseReviewText(){let c=Object.values(cases());if(!c.length)return'No cases yet. Use PA Intake first.';return c.map(x=>(x.name||'Case')+'\nStatus: '+caseStatus(x)+'\nWaiting: '+(x.waiting_for||'')+'\nRisk: '+(x.risk||'')+'\nEvidence: '+(x.evidence_score||'')+'/5\nLast update: '+(x.updated||'')+'\nNext: '+(x.next||'')).join('\n\n---\n\n')}
function showEOS(){let app=document.getElementById('app');app.innerHTML='';let load=calcLoad();let d=document.createElement('div');d.className='card soft';d.innerHTML='<b>Daily EOS Dashboard</b><div class="small">Current visible workload</div>'+progress(load)+'<div class="out">'+esc(eosText())+'</div>';app.appendChild(d);app.appendChild(grid([['🧠 Case Review',showCases,'primary'],['🛡 Recovery Guard',showRecovery,'danger'],['📎 Evidence Watch',showEvidence,'primary'],['📋 Copy EOS',()=>navigator.clipboard?.writeText(eosText()),'green']]));}
function showCases(){let app=document.getElementById('app');app.innerHTML='';app.appendChild(card('Case Review v2',caseReviewText(),true));app.appendChild(grid([['Back to EOS',showEOS,'primary'],['Copy',()=>navigator.clipboard?.writeText(caseReviewText()),'green']]));}
function showRecovery(){let app=document.getElementById('app');app.innerHTML='';app.appendChild(card('Recovery Guard v2',recoveryText(),true));app.appendChild(grid([['Start 48h Recovery',()=>{let s=state();s.mode='RECOVERY';s.recovery_until=Date.now()+48*3600000;localStorage.uos_state=JSON.stringify(s);showRecovery()},'danger'],['Back to EOS',showEOS,'primary']]));}
function showEvidence(){let app=document.getElementById('app');app.innerHTML='';app.appendChild(card('Evidence Watch v2',evidenceText(),true));app.appendChild(grid([['Back to EOS',showEOS,'primary'],['Copy',()=>navigator.clipboard?.writeText(evidenceText()),'green']]));}
showEOS();
</script></body></html>
