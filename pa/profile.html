<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#315f9f"><title>Menglu Profile Passport</title><style>:root{--bg:#f8fbff;--card:#fff;--line:#d9d8ee;--ink:#111;--blue:#315f9f;--red:#9b111e;--green:#166534;--soft:#eef7ff;--pink:#fff3f8}*{box-sizing:border-box}body{font-family:Arial,sans-serif;margin:0;background:linear-gradient(180deg,var(--bg),#fff8fc);color:var(--ink);padding:12px 12px 92px;max-width:760px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;box-shadow:0 2px 10px rgba(49,95,159,.06)}.soft{background:linear-gradient(135deg,var(--soft),var(--pink))}h1{font-size:24px;margin:4px 0}h2{font-size:19px;margin:6px 0}.out{white-space:pre-wrap;font-size:17px;line-height:1.45}.small{font-size:14px;color:#555;line-height:1.35}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}button{width:100%;font-size:16px;line-height:1.22;padding:12px;border:1px solid #bbb;border-radius:15px;background:#fff;text-align:left;min-height:58px}button.primary{border:2px solid var(--blue);color:var(--blue);font-weight:700;background:#f4f9ff}button.red{border:2px solid var(--red);color:var(--red);font-weight:700;background:#fff7f7}button.green{border:2px solid var(--green);color:var(--green);font-weight:700;background:#f4fff7}.bottom{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;background:rgba(255,255,255,.96);border-top:1px solid var(--line);padding:6px;max-width:760px;margin:auto}.bottom button{font-size:12px;text-align:center;padding:8px 2px;min-height:44px;border-radius:12px}@media(max-width:340px){.grid{grid-template-columns:1fr}}</style></head><body><h1>👤 Menglu Profile Passport</h1><div class="card soft"><b>One-button summary</b><div class="out" id="quick"></div></div><div class="grid"><button class="primary" onclick="speak(PROFILE.quick)">🗣 Speak 60s Profile</button><button class="green" onclick="copy(PROFILE.quick)">📋 Copy Profile</button><button onclick="speak(PROFILE.short)">🟢 Speak 15s Summary</button><button onclick="copy(PROFILE.adjustments)">📋 Copy Adjustments</button><button onclick="speak(PROFILE.emergency)" class="red">🚨 Speak Emergency</button><button onclick="copy(PROFILE.mum)">👩 Copy 中文给妈妈</button></div><div id="sections"></div><nav class="bottom"><button onclick="location.href='./'">🏠<br>PA</button><button onclick="location.href='../'">🐻<br>Mellow</button><button onclick="location.href='../mira-next/'">✨<br>Mira</button><button onclick="speak(PROFILE.quick)">🗣<br>Speak</button></nav><script>
const PROFILE={
short:`Hello. I normally speak, but today I need to use this communication app because autistic burnout, fatigue, brain fog, pain, dizziness, anxiety or PEM may affect my speech and processing. Please communicate in writing where possible, ask one question at a time, and allow extra processing time. I may mask, so my difficulties may not be obvious.`,
quick:`Hello. My name is Menglu Liu.\n\nI am using this communication app today because autistic burnout, fatigue, anxiety, pain, dizziness, brain fog or post-exertional malaise may affect my speech, processing and ability to explain things reliably.\n\nI normally speak, but during these periods I may need AAC, typing, written communication, or support from my mum.\n\nI am autistic and have ME/CFS with PEM, POTS or orthostatic intolerance, hypermobility with suspected hEDS/HSD, anxiety, IBS, TMJ problems, Burning Mouth Syndrome, allergic rhinitis, PMDD, and other long-term health issues.\n\nMy main difficulties are processing spoken information, communication, executive functioning, severe fatigue, brain fog, dizziness, sensory overload, planning, follow-up, remembering, decision-making and travel.\n\nPlease use written communication where possible. Telephone calls are not accessible or safe for me.\n\nPlease ask one question at a time, allow extra processing time, and provide a written summary, Easy Read information, visual aids, or a body chart if available.\n\nI may appear calmer or more capable than I feel because I mask. Please assess me using my functional difficulties, not only my appearance.\n\nIf possible, please minimise appointments and repeated tests, combine things where clinically appropriate, and allow recovery time afterwards.\n\nThank you.`,
adjustments:`Reasonable adjustments needed:\n\n• Written communication where possible\n• No telephone calls unless unavoidable and supported\n• One question at a time\n• Simple language\n• Extra processing time\n• Written summary after appointments\n• Easy Read where possible\n• Allow AAC, typing, notes and support person\n• Visual aids or body chart where helpful\n• Do not assess ability from appearance or masking\n• Treat supported functioning as different from independent functioning\n• Consider delayed deterioration and recovery needs\n• Minimise repeated appointments, repeated explanations and unnecessary demands where possible`,
emergency:`I may not be able to speak right now. Please read this screen. I am autistic and have POTS, ME/CFS, communication difficulties and hypermobility. If I feel faint, dizzy, overwhelmed or in shutdown, please help me sit or lie down safely, reduce noise and questions, and use short written sentences. Please contact my mum or support person if possible. If this is a medical emergency, please call 999.`,
mum:`妈妈，简单说：\n\n我可能因为自闭症过载、疲劳、POTS、脑雾、疼痛、焦虑或 PEM，暂时说话和处理信息困难。\n\n请不要连续追问。一次只说一件事。重要事情请写下来。\n\n请不要让我打电话。需要用书面沟通，慢慢处理。`,
conditions:['Autism with high support needs and communication/processing barriers','ME/CFS with post-exertional malaise','POTS / orthostatic intolerance','Hypermobility, suspected hEDS/HSD','Anxiety, depression and trauma-related distress','IBS','TMJ dysfunction','Burning Mouth Syndrome and oral sensitivity','Allergic rhinitis / hay fever','PMDD / menstrual worsening','Thyroid nodule under surveillance'],
struggles:['Spoken-information processing','Communication under stress','Executive functioning and administration','Severe fatigue and PEM','Brain fog and memory load','Dizziness, presyncope and poor upright tolerance','Sensory overload','Planning, follow-up and coordination','Decision fatigue','Travel and public environments','Masking that hides severity'],
support:['Mum provides day-to-day support but has limited English','Dad drives because independent travel/public transport is not reliable','Phone calls are an accessibility barrier','Written communication is safer','Appointments and outings often need recovery afterwards','Supported functioning is not independent functioning'],
meds:['Dymista nasal spray for allergic rhinitis','Other medication/supplement details should be checked before use or discussion','Cautious about medication side effects and tolerability'],
access:['Written communication','No phone calls','One question at a time','Extra processing time','Easy Read','Written summary','AAC / typing / prepared notes','Support person','Visual aids / body chart','Minimise appointments and repeated explanations','Recovery-aware planning']
};
function copy(t){navigator.clipboard?.writeText(t).catch(()=>{});alert('Copied. Review before sending.')}function speak(t){try{speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.rate=.92;speechSynthesis.speak(u)}catch(e){}document.getElementById('quick').textContent=t}
function list(title,arr){return '<div class="card"><h2>'+title+'</h2><div class="out">• '+arr.join('\n• ')+'</div></div>'}
document.getElementById('quick').textContent=PROFILE.quick;localStorage.uos_profile_passport=JSON.stringify(PROFILE);document.getElementById('sections').innerHTML=list('Conditions',PROFILE.conditions)+list('Main difficulties',PROFILE.struggles)+list('Support needs',PROFILE.support)+list('Medication / treatment notes',PROFILE.meds)+list('Accessibility passport',PROFILE.access)+'<div class="card"><h2>Professional wording</h2><div class="out">'+PROFILE.adjustments+'</div></div>';
</script></body></html>
