Current update or concern:

Please load relevant saved context for this case and produce:

1. Confirmed facts.
2. Current objective.
3. Current status.
4. Who is waiting for whom.
5. Outstanding actions.
6. Risks or gaps.
7. What can wait.
8. The single recommended next action.

- REVIEW REQUIRED
