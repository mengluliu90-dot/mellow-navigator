<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#315f9f"><title>Menglu OS Start</title><style>:root{--bg:#f8fbff;--card:#fff;--line:#d9d8ee;--ink:#111;--blue:#315f9f;--red:#9b111e;--green:#166534;--soft:#eef7ff;--pink:#fff3f8;--purple:#6d28d9}*{box-sizing:border-box}body{font-family:Arial,sans-serif;margin:0;background:linear-gradient(180deg,var(--bg),#fff8fc);color:var(--ink);padding:14px 14px 92px;max-width:760px}h1{font-size:24px;margin:4px 0}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;box-shadow:0 2px 10px rgba(49,95,159,.06)}.soft{background:linear-gradient(135deg,var(--soft),var(--pink))}.out{white-space:pre-wrap;font-size:17px;line-height:1.45}.small{font-size:14px;color:#555}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}button{width:100%;font-size:16px;line-height:1.22;padding:12px;border:1px solid #bbb;border-radius:15px;background:#fff;text-align:left;min-height:64px}button.primary{border:2px solid var(--blue);color:var(--blue);font-weight:700;background:#f4f9ff}button.danger{border:2px solid var(--red);color:var(--red);font-weight:700;background:#fff7f7}button.green{border:2px solid var(--green);color:var(--green);font-weight:700;background:#f4fff7}button.purple{border:2px solid var(--purple);color:var(--purple);font-weight:700;background:#fbf7ff}.bottom{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;background:rgba(255,255,255,.96);border-top:1px solid var(--line);padding:6px;max-width:760px;margin:auto}.bottom button{font-size:12px;text-align:center;padding:8px 2px;min-height:44px;border-radius:12px}@media(max-width:340px){.grid{grid-template-columns:1fr}}</style></head><body><h1>🧭 Menglu OS Start</h1><div class="card soft"><b>One coherent system</b><div class="out">A simple entry page linking the working PA, Mellow, Mira, Profile Passport, EOS pages and the practical workflow launcher.</div></div><div class="grid"><button class="purple" onclick="location.href='workflows.html'">🌸 Workflow Home<br><span class="small">Appointment, case, email, travel, Easy Read and open loop prompts.</span></button><button class="primary" onclick="location.href='./'">🪄 PA Intake<br><span class="small">Create structured object, tasks, draft, timeline.</span></button><button class="green" onclick="location.href='profile.html'">👤 Profile Passport<br><span class="small">Show or speak conditions, needs and adjustments.</span></button><button class="primary" onclick="location.href='eos.html'">🧭 EOS Dashboard<br><span class="small">Capacity, recovery, risks, one recommended action.</span></button><button onclick="location.href='../'">🐻 Mellow<br><span class="small">Speak profile, AAC and latest PA object.</span></button><button onclick="location.href='../mira-next/'">✨ Mira Evidence<br><span class="small">View objects, evidence, waiting and draft layers.</span></button><button class="danger" onclick="startRecovery()">🛡 Start 48h Recovery<br><span class="small">Protect recovery and reduce optional admin.</span></button></div><div id="out" class="card out"></div><nav class="bottom"><button onclick="location.href='workflows.html'">Flow</button><button onclick="location.href='./'">PA</button><button onclick="location.href='profile.html'">Profile</button><button onclick="location.href='eos.html'">EOS</button><button onclick="location.href='../'">Mellow</button></nav><script>function startRecovery(){let s={mode:'RECOVERY',recovery_until:Date.now()+48*3600000};try{localStorage.uos_state=JSON.stringify(s);localStorage.mn_recovery_until=s.recovery_until}catch(e){}document.getElementById('out').textContent='Recovery protection started for 48 hours. Optional admin should stay hidden unless urgent or statutory.'}</script></body></html>
