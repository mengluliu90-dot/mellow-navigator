<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#315f9f"><link rel="manifest" href="manifest.json"><link rel="icon" href="pa-icon.svg"><link rel="apple-touch-icon" href="pa-icon.svg"><title>Menglu PA</title><style>:root{--bg:#f8fbff;--card:#fff;--line:#d9d8ee;--ink:#111;--blue:#315f9f;--red:#a40000;--soft:#eef7ff;--pink:#fff3f8}*{box-sizing:border-box}body{font-family:Arial,sans-serif;margin:0;background:linear-gradient(180deg,var(--bg),#fff8fc);color:var(--ink);padding:12px 12px 86px;max-width:760px}h1{font-size:25px;margin:4px 0}h2{font-size:21px;margin:10px 0}.top{display:flex;gap:10px;align-items:center}.logo{width:52px;height:52px;border-radius:16px}.tag{font-size:13px;border:1px solid var(--line);border-radius:999px;padding:5px 8px;background:white}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;box-shadow:0 2px 10px rgba(49,95,159,.06)}.soft{background:linear-gradient(135deg,var(--soft),var(--pink))}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}button{width:100%;font-size:16px;line-height:1.22;padding:12px;border:1px solid #bbb;border-radius:15px;background:#fff;text-align:left;min-height:58px}button.primary{border:2px solid var(--blue);color:var(--blue);font-weight:700;background:#f4f9ff}button.danger{border:2px solid var(--red);color:var(--red);font-weight:700;background:#fff7f7}input,textarea,select{width:100%;font-size:17px;padding:12px;margin:6px 0 10px;border:1px solid #aaa;border-radius:12px;background:#fff}.out{white-space:pre-wrap;font-size:17px;line-height:1.45}.small{font-size:14px;color:#555;line-height:1.35}.bottom{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;background:rgba(255,255,255,.96);border-top:1px solid var(--line);padding:6px;max-width:760px;margin:auto}.bottom button{font-size:12px;text-align:center;padding:8px 2px;min-height:44px;border-radius:12px}.pill{display:inline-block;background:#eef7ff;border:1px solid var(--line);border-radius:999px;padding:4px 8px;margin:2px;font-size:13px}@media(max-width:330px){.grid{grid-template-columns:1fr}button{font-size:15px}}</style></head><body><div class="top"><img src="pa-icon.svg" class="logo" alt=""><div><h1>Menglu PA</h1><div class="tag">Quiet coordinator · not another tracker</div></div></div><main id="app"></main><nav class="bottom"><button onclick="home()">🏠<br>Home</button><button onclick="receive()">📥<br>Received</button><button onclick="apptDone()">🏁<br>Done</button><button onclick="mum()">中文<br>Mum</button><button onclick="apps()">🔗<br>Apps</button></nav><script>const app=document.getElementById('app');const K={log:'pa_log',email:'pa_email',appt:'pa_appt',mum:'pa_mum',wait:'pa_wait'};const MK={loop:'mn_loop',line:'mn_line',doc:'mn_doc2',task:'mn_task'};function arr(k){try{return JSON.parse(localStorage[k]||'[]')}catch(e){return[]}}function add(k,o){let a=arr(k);o.date=new Date().toLocaleString('en-GB');a.unshift(o);localStorage[k]=JSON.stringify(a)}function v(id){return document.getElementById(id)?.value.trim()||''}function set(id,t){let e=document.getElementById(id);if(e)e.textContent=t}function copy(t){navigator.clipboard.writeText(t).catch(()=>{})}function grid(x){return '<div class="grid">'+x.map(i=>'<button class="'+(i[2]||'')+'" onclick="'+i[1]+'">'+i[0]+'</button>').join('')+'</div>'}function shell(t,b){app.innerHTML='<div class="card soft"><b>'+t+'</b><p class="small">Goal: reduce work. PA does sorting, wording, filing and linking. You only review final decisions.</p></div>'+b}function kind(x){let s=x.toLowerCase();if(s.includes('appointment')||s.includes('clinic')||s.includes('hospital')||s.includes('nhs')||s.includes('gp'))return 'healthcare';if(s.includes('universal credit')||s.includes('pip')||s.includes('dwp')||s.includes('benefit'))return 'benefits';if(s.includes('bank')||s.includes('payment')||s.includes('account'))return 'bank';if(s.includes('repair')||s.includes('housing')||s.includes('tenant'))return 'housing';return 'general'}async function pasteTo(id){let e=document.getElementById(id);try{e.value=await navigator.clipboard.readText();e.focus()}catch(x){e.focus();alert('Clipboard blocked. Paste manually.')}}function openUrl(u){location.href=u}function home(){let w=arr(K.wait).filter(x=>x.status!=='Closed').length;let msg=w?'PA is quietly holding '+w+' waiting item(s).':'Nothing needs doing from PA.';shell('Low-demand home','<div class="card out">'+msg+'\n\nNo daily check-in. No streaks. No extra forms.</div>'+grid([['📥 I received something','receive()','primary'],['🏁 Appointment finished','apptDone()','primary'],['✉️ Review email / letter','inbox()'],['🇨🇳 Tell Mum','mum()'],['🔗 Open my apps','apps()'],['🆘 Emergency support','emergency()','danger']]))}function receive(){shell('I received something','<div class="card"><textarea id="rx" rows="8" placeholder="Paste email, letter, appointment text, or note here"></textarea>'+grid([['Paste','pasteTo(\'rx\')'],['PA process it','processReceived()','primary']])+'</div><div id="out" class="card out"></div>')}function processReceived(){let x=v('rx'),k=kind(x);let reply='Dear Team,\n\nThank you for your message. Because of my disability-related communication and processing difficulties, please continue in writing and confirm the next step, who is responsible, and the timescale.\n\nKind regards,\nMenglu Liu';let m='PA PROCESSED\n\nType: '+k+'\n\nWhat PA did:\n✓ classified it\n✓ made Easy Read headings\n✓ drafted safe reply\n✓ added to Mira timeline\n✓ created waiting loop if follow-up may be needed\n\nEasy Read:\n1. What this means:\n2. Action needed:\n3. Deadline:\n4. Safest next step:\n\nDraft reply:\n'+reply;set('out',m);add(K.log,{type:k,text:x,result:m});add(MK.line,{a:'PA received: '+k,b:x});add(MK.doc,{a:'PA document: '+k,b:m});add(K.wait,{a:'Review received '+k+' item',status:'Waiting / review only',b:'PA processed. Review only if needed.'});add(MK.loop,{a:'Review received '+k+' item',org:k,status:'Waiting / review only',b:'PA processed. Review only if needed.'})}function inbox(){shell('Email / Letter Review','<div class="card"><textarea id="emailText" rows="8" placeholder="Paste email or letter here"></textarea>'+grid([['Paste from clipboard','pasteTo(\'emailText\')'],['Review + draft reply','reviewEmail()','primary']])+'</div><div id="out" class="card out"></div>')}function reviewEmail(){let x=v('emailText'),k=kind(x);let r='EMAIL REVIEW\n\nType: '+k+'\nUrgency: only if deadline/action is present\n\nEasy Read:\n1. What this means:\n2. What I need to do:\n3. Deadline:\n4. Risk if I do nothing:\n5. Safest next step:\n\nDraft reply:\nDear Team,\n\nThank you for your message. Because of my disability-related communication and processing difficulties, please continue in writing and confirm the next step, who is responsible, and the timescale.\n\nKind regards,\nMenglu Liu\n\nOriginal text:\n'+x;set('out',r);add(K.email,{type:k,text:r});add(MK.doc,{a:'PA email review: '+k,b:r});add(MK.line,{a:'PA reviewed email/letter',b:k})}function apptDone(){shell('Appointment Finished','<div class="card"><textarea id="an" rows="7" placeholder="Optional: paste brief notes. Leave blank if too tired."></textarea>'+grid([['PA finish appointment','finishAppt()','primary'],['Just start recovery','startRecovery()','danger']])+'</div><div id="out" class="card out"></div>')}function finishAppt(){let x=v('an')||'Appointment finished. Details can be added later.';let m='Appointment finished.\n\nPA did:\n✓ started 48h recovery mode in Mira\n✓ added timeline entry\n✓ created follow-up loop\n✓ generated Mandarin summary\n\nDo not do extra admin now unless urgent.\n\nNotes:\n'+x;localStorage.mn_recovery_until=Date.now()+48*3600000;add(MK.line,{a:'Appointment finished - recovery started',b:x});add(MK.loop,{a:'Check appointment follow-up',org:'Healthcare',status:'Waiting / review only',b:x});add(K.appt,{text:x});set('out',m+'\n\n'+mumText(x));}function startRecovery(){localStorage.mn_recovery_until=Date.now()+48*3600000;set('out','48h recovery started in Mira. Avoid phone calls, forms, banking, complex replies and new admin.')}function mumText(x){return '妈妈，今天的预约结束了。\n\n简单说：\n'+x+'\n\n接下来：请先让我休息。如果有信、电话、预约或需要回复，请帮我之后再慢慢看。\n\n我现在可能会脑雾、累、说不清楚，不是不想说。预约后1-2天可能会更累。'}function mum(){shell('Tell Mum in Mandarin','<div class="card"><textarea id="mumIn" rows="7" placeholder="Paste appointment/email notes. PA will make it simple Mandarin."></textarea>'+grid([['Paste notes','pasteTo(\'mumIn\')'],['Generate + copy WeChat','makeMum()','primary']])+'</div><div id="out" class="card out"></div>')}function makeMum(){let x=v('mumIn')||'今天有事情处理，我现在需要休息。';let m=mumText(x);set('out',m);copy(m);add(K.mum,{text:m})}function calendarTool(){shell('Calendar Assistant','<div class="card"><input id="ctitle" placeholder="Appointment title"><input id="cdate" type="date"><input id="ctime" type="time"><input id="cloc" placeholder="Location"><textarea id="cnotes" rows="3" placeholder="Notes / bring / questions"></textarea>'+grid([['Create calendar file','makeICS()','primary'],['Recovery text','recoveryText()']])+'</div><div id="out" class="card out"></div>')}function makeICS(){let title=v('ctitle')||'Appointment',date=v('cdate'),time=v('ctime')||'10:00',loc=v('cloc'),notes=v('cnotes');if(!date){set('out','Choose a date first.');return}let dt=date.replaceAll('-','')+'T'+time.replace(':','')+'00';let ics='BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:'+title+'\nDTSTART:'+dt+'\nDURATION:PT1H\nLOCATION:'+loc+'\nDESCRIPTION:Bring notes. Written communication. Plan recovery. '+notes+'\nEND:VEVENT\nEND:VCALENDAR';let blob=new Blob([ics],{type:'text/calendar'});let url=URL.createObjectURL(blob);document.getElementById('out').innerHTML='Calendar file ready. Tap link, then Add to Calendar.\n\n<a href="'+url+'" download="appointment.ics">📅 Add to Calendar file</a>';add(K.appt,{title,date,time,loc,notes});add(MK.loop,{a:'Prepare for '+title,org:'Calendar',status:'Waiting / review only',b:date+' '+time})}function recoveryText(){let t='After this appointment, plan 48 hours recovery. Avoid phone calls, banking, forms, difficult decisions and extra admin.';set('out',t);copy(t)}function phoneBlock(){let t='Because of my disability-related communication difficulties, telephone calls are not accessible or safe for me. Please continue by email or letter. Please provide clear written information, one issue at a time, with next steps, responsibility and timescale. Thank you.';shell('Phone-call blocker','<div class="card out" id="block">'+t+'</div>'+grid([['Copy text',"copy(document.getElementById('block').textContent)",'primary'],['Speak it',"say(document.getElementById('block').textContent)"]]))}function apps(){shell('Connected apps','<div class="card small">PA coordinates. It does not duplicate tools.</div>'+grid([['🗣 Open AAC','openUrl(\'../\')','primary'],['✨ Open Mira Next','openUrl(\'../mira-next/\')','primary'],['📅 Calendar tool','calendarTool()'],['✉️ Email review','inbox()'],['🛡 Phone blocker','phoneBlock()'],['📥 Received item','receive()']]))}function emergency(){shell('Emergency','<div class="card out" id="help">I need help communicating. I may have reduced speech, brain fog, dizziness, severe fatigue or sensory overload. Please use written communication, ask one question at a time, give extra processing time, reduce noise and pressure, and do not assume I am refusing because I cannot answer.</div>'+grid([['Speak','say(document.getElementById(\'help\').textContent)','danger'],['Copy','copy(document.getElementById(\'help\').textContent)'],['Open AAC','location.href=\'../\'','primary']]))}function say(t){if('speechSynthesis'in window){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='en-GB';u.rate=.82;speechSynthesis.speak(u)}else alert(t)}home();</script></body></html>
