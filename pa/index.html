<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#315f9f"><link rel="manifest" href="manifest.json"><link rel="icon" href="pa-icon.svg"><link rel="apple-touch-icon" href="pa-icon.svg"><title>Menglu OS</title><style>:root{--bg:#f8fbff;--card:#fff;--line:#d9d8ee;--ink:#111;--blue:#315f9f;--red:#9b111e;--green:#166534;--amber:#92400e;--soft:#eef7ff;--pink:#fff3f8}*{box-sizing:border-box}body{font-family:Arial,sans-serif;margin:0;background:linear-gradient(180deg,var(--bg),#fff8fc);color:var(--ink);padding:12px 12px 92px;max-width:760px}h1{font-size:24px;margin:4px 0}.top{display:flex;gap:10px;align-items:center}.logo{width:52px;height:52px;border-radius:16px}.tag{font-size:13px;border:1px solid var(--line);border-radius:999px;padding:5px 8px;background:#fff}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;box-shadow:0 2px 10px rgba(49,95,159,.06)}.soft{background:linear-gradient(135deg,var(--soft),var(--pink))}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}button{width:100%;font-size:16px;line-height:1.22;padding:12px;border:1px solid #bbb;border-radius:15px;background:#fff;text-align:left;min-height:58px}button.primary{border:2px solid var(--blue);color:var(--blue);font-weight:700;background:#f4f9ff}button.danger{border:2px solid var(--red);color:var(--red);font-weight:700;background:#fff7f7}button.green{border:2px solid var(--green);color:var(--green);font-weight:700;background:#f4fff7}textarea,input{width:100%;font-size:17px;padding:12px;margin:6px 0 10px;border:1px solid #aaa;border-radius:12px;background:#fff}.out{white-space:pre-wrap;font-size:17px;line-height:1.45}.small{font-size:14px;color:#555;line-height:1.35}.bar{height:11px;border-radius:999px;background:#e5e7eb;overflow:hidden;margin:6px 0}.fill{height:100%;background:#315f9f}.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:4px 8px;margin:3px;background:#fff}.red{color:var(--red);font-weight:700}.amber{color:var(--amber);font-weight:700}.bottom{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;background:rgba(255,255,255,.96);border-top:1px solid var(--line);padding:6px;max-width:760px;margin:auto}.bottom button{font-size:12px;text-align:center;padding:8px 2px;min-height:44px;border-radius:12px}@media(max-width:330px){.grid{grid-template-columns:1fr}}</style></head><body><div class="top"><img src="pa-icon.svg" class="logo" alt=""><div><h1>Menglu OS</h1><div class="tag">v2.1 · Object-driven automation</div></div></div><main id="app"><div class="card soft">Loading...</div></main><nav class="bottom"><button id="bDash">🏠<br>Dash</button><button id="bIntake">🪄<br>Intake</button><button id="bTasks">✅<br>Tasks</button><button id="bCases">🧠<br>Cases</button><button id="bApps">🔗<br>Apps</button></nav><script>
const app=document.getElementById('app');
const STORE={cases:'uos_cases',timeline:'uos_timeline',last:'uos_last',profile:'uos_profile',state:'uos_state',learn:'uos_learning',tasks:'uos_tasks',contacts:'uos_contacts',drafts:'uos_drafts',objects:'uos_objects'};
const CASES={rheum:['Rheumatology / hEDS',/rheumatology|heds|hsd|hypermobility|joint|beighton|pain|pots/i],gp:['GP',/\bgp\b|doctor|practice|banbridge group|dr cullen|dr dillon|dr mcniff/i],social:['Social Care',/social care|care plan|assessment|support worker/i],mary:['Mary-Sue',/mary-sue|mary sue|ohare|o’hare/i],cherry:['Cherrytrees',/cherrytrees|physical disability team/i],pip:['PIP',/\bpip\b|personal independence payment|mandatory reconsideration|tribunal|assessment/i],uc:['Universal Credit',/universal credit|\buc\b|lcwra|appointee|work coach|mollie/i],bank:['Banking',/aib|bank|payment|direct debit|standing order|chargeback|refund|lcs|1st locate|debt|fraud|scam/i],housing:['Housing',/housing|repair|lotus|clixifix|leak|water ingress|alarm|boiler|plumber|electric|lights/i],dentistry:['Dentistry',/dentist|dental|tooth|gum|catherine|claire/i],thyroid:['Thyroid',/thyroid|nodule|ultrasound|endocrine/i],oral:['Oral Medicine',/oral medicine|burning mouth|tmj|jaw|mouth/i],travel:['Travel / Going Out',/travel|journey|bus|train|taxi|shopping|restaurant|outside|outing/i],access:['Accessibility',/reasonable adjustment|easy read|written summary|no phone|telephone|aac|communication|visual aid|body chart/i]};
const PROFILE={written:'Phone calls are an accessibility barrier. Use written communication.',easy:'Request Easy Read or simple written summary.',recovery:'Appointments and outings require recovery protection.',outing:'Out-of-home activity should be limited to about 2 days per week.',masking:'Masking may make difficulties appear less severe. Supported functioning is not independent functioning.',visual:'Ask for body chart or visual aids where helpful.',principle:'Every update must reduce work, not increase features.'};
const RECOVERY={shopping:12,dentist:36,travel:24,gp:48,social:48,rheum:72,hospital:72,bank:24,benefits:48};
function jget(k,d){try{return JSON.parse(localStorage[k]||JSON.stringify(d))}catch(e){return d}}
function jset(k,v){localStorage[k]=JSON.stringify(v)}
function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function el(tag,cls,txt){let x=document.createElement(tag);if(cls)x.className=cls;if(txt!==undefined)x.textContent=txt;return x}
function card(t,b){let c=el('div','card');if(t){let h=document.createElement('b');h.textContent=t;c.appendChild(h)}if(b){let d=el('div','out',b);c.appendChild(d);d.textContent=b}return c}
function btn(label,fn,cls=''){let b=document.createElement('button');b.className=cls;b.innerHTML=label;b.addEventListener('click',fn);return b}
function grid(items){let g=el('div','grid');items.forEach(i=>g.appendChild(btn(i[0],i[1],i[2]||'')));return g}
function copy(t){navigator.clipboard?.writeText(t).catch(()=>{})}
function out(t){let o=document.getElementById('out');if(!o){o=el('div','card out');o.id='out';app.appendChild(o)}o.textContent=t}
function progress(n){let w=Math.max(0,Math.min(100,n||0));return '<div class="bar"><div class="fill" style="width:'+w+'%"></div></div>'}
function screen(t,b,items=[]){app.innerHTML='';let c=card(t,b);c.classList.add('soft');app.appendChild(c);if(items.length)app.appendChild(grid(items))}
function dashboard(){let tasks=jget(STORE.tasks,[]),tl=jget(STORE.timeline,[]),cm=jget(STORE.cases,{}),objs=jget(STORE.objects,[]),s=jget(STORE.state,{mode:'HOME',recovery_until:0}),ready=tasks.filter(t=>t.status==='Needs Review'||t.priority==='RED'),waiting=tasks.filter(t=>t.status==='Waiting'),hidden=tasks.filter(t=>t.status==='Hidden');let rec=Number(s.recovery_until||0)>Date.now();let load=calcLoad();app.innerHTML='';app.appendChild(card('Life Dashboard','Already handled\n✓ Objects created: '+objs.length+'\n✓ Cases updated: '+Object.keys(cm).length+'\n✓ Timeline items: '+tl.length+'\n✓ Tasks generated: '+tasks.length+'\n\nNeed Menglu\n□ '+(ready[0]?.title||'Nothing urgent')+'\n\nState: '+(rec?'RECOVERY':'HOME')+'\nEstimated visible effort: '+(ready.length?'2 minutes':'0 minutes')));let dash=el('div','card');dash.innerHTML='<b>Demand budget</b><div class="small">Current visible work</div>'+progress(load)+'<div class="small">Ready '+ready.length+' · Waiting '+waiting.length+' · Hidden '+hidden.length+'</div>';app.appendChild(dash);app.appendChild(grid([['🪄 New Intake',intake,'primary'],['✅ Tasks',tasksView,'primary'],['🧠 Cases',cases],['🧾 Timeline',timeline],['Start Recovery',()=>{s.mode='RECOVERY';s.recovery_until=Date.now()+48*3600000;jset(STORE.state,s);dashboard()},'danger']]));}
function intake(){app.innerHTML='';app.appendChild(card('Universal Intake','Drop anything here. Menglu OS creates a structured object, links cases, builds tasks, prepares draft layers, and shows one safest action.'));let ta=document.createElement('textarea');ta.id='txt';ta.rows=8;ta.placeholder='Paste email, letter, appointment, screenshot text, message, or file text here.';app.appendChild(ta);let f=document.createElement('input');f.type='file';f.accept='image/*,.pdf,.txt,.doc,.docx';f.addEventListener('change',()=>out('File selected. On iPhone, use Live Text to copy image text into the box, or upload the image directly to ChatGPT for image reading.'));app.appendChild(f);app.appendChild(grid([['🪄 Process Clipboard',async()=>{try{let t=await navigator.clipboard.readText();ta.value=t;runPipeline(t)}catch(e){out('Clipboard blocked. Copy text first, then try again.')}},'primary'],['✅ Process Intake',()=>runPipeline(ta.value),'primary'],['🏠 Dashboard',dashboard],['📋 Last Result',last]]));let o=el('div','card out');o.id='out';app.appendChild(o)}
function runPipeline(text){if(!text||!text.trim()){out('Nothing to process. Paste text first.');return}let o=intakeEngine(text);o=relationshipEngine(o);o=duplicateEngine(o);if(o.duplicate){let msg='ACTION LOGGED: Already tracked. No new action.';saveLast({format:'A',output:msg});return showResult(msg,null)}o=eventEngine(o);o=caseObjectEngine(o);o=taskEngine(o);o=draftEngine(o);o=timelineEngine(o);o=recoveryEngine(o);o=confidenceEngine(o);o=executiveFunctionEngine(o);o=accessibilityValidator(o);commit(o);showResult(o.output,o)}
function intakeEngine(text){let low=text.toLowerCase(),format='Text';if(/from:|subject:|dear|regards|unsubscribe/i.test(text))format='Email/Letter';if(/screenshot|photo|image|jpg|png/i.test(text))format='Photo/Screenshot';if(/pdf|report|result|blood test|ultrasound|scan/i.test(text))format='PDF/Medical File';if(/whatsapp|message|sms/i.test(text))format='Chat/Message';return{object_id:'OBJ-'+Date.now(),intake_id:'INT-'+Date.now(),raw:text,low,source_format:format,timestamp:new Date().toISOString(),signature:text.slice(0,180).toLowerCase().replace(/\s+/g,' ')}}
function relationshipEngine(o){let keys=Object.keys(CASES).filter(k=>CASES[k][1].test(o.raw));if(!keys.length)keys=['general'];o.caseKeys=keys;o.caseNames=keys.map(k=>CASES[k]?.[0]||'General');return o}
function duplicateEngine(o){let objs=jget(STORE.objects,[]);o.duplicate=objs.some(x=>x.signature===o.signature);return o}
function eventEngine(o){let t=o.low,event='Information received';if(/appointment|booking|scheduled|attend/.test(t))event='Appointment booked';else if(/cancelled|canceled/.test(t))event='Appointment cancelled';else if(/referral sent|referred/.test(t))event='Referral sent';else if(/referral received|accepted/.test(t))event='Referral received';else if(/blood test|test requested|sample/.test(t))event='Test requested';else if(/result|normal|abnormal|report/.test(t))event='Test result';else if(/payment taken|paid|charged|direct debit/.test(t))event='Payment taken';else if(/refund|chargeback/.test(t))event='Refund issued';else if(/deadline|by \d|before|final/.test(t))event='Deadline';else if(/complaint|concern|safeguard/.test(t))event='Complaint / concern';else if(/decision|award|outcome/.test(t))event='Decision letter';else if(/repair booked|appointment for repair|plumber|electrician/.test(t))event='Repair booked';o.event_type=event;o.deadline=findDate(o.raw)||'No clear date found';o.phone=/phone|call|telephone/i.test(o.raw);o.action=/reply|required|complete|return|confirm|book|attend|deadline|before|by |contact|provide|send|submit|form/i.test(o.raw)||/Appointment|Deadline|Decision|Complaint/.test(event);o.risk=/urgent|final|overdue|missed|debt|fraud|scam|cancel|suspend|deadline|termination|failure to/i.test(o.raw);o.openLoop=/will contact|waiting|referral|follow up|respond|reply|investigation|review|arrange|book|confirm|promise/i.test(o.raw);return o}
function caseObjectEngine(o){o.evidence_score=evidenceScore(o);o.case_objects=o.caseKeys.map(k=>({case_id:k,case_name:CASES[k]?.[0]||'General',status:'Active',phase:o.event_type,owner:ownerFor(k),waiting_for:o.openLoop?'External response / promise':(o.action?'Menglu review only if needed':'No action'),evidence_score:o.evidence_score,risk:o.risk?'High':(o.action?'Medium':'Low'),recovery_impact:recoveryFor(k,o),open_loops:o.openLoop?1:0,next_action:nextStep(o),confidence:null,last_updated:new Date().toISOString()}));return o}
function taskEngine(o){let tasks=[];tasks.push(task('Link evidence to '+o.caseNames.join(' / '),'Done','LOW','Evidence score '+o.evidence_score+'/5. Saved as structured object.',100,'None',o));if(/Appointment booked|Appointment cancelled/.test(o.event_type)){tasks.push(task('Prepare appointment pack','Needs Review','AMBER','AAC, questions, written/no-phone, Easy Read, written summary, body chart/visual aids.',85,'Review pack',o));tasks.push(task('Recovery block','Hidden','AMBER','Adaptive recovery window: '+maxRecovery(o)+' hours.',100,'None',o));tasks.push(task('Post-appointment follow-up','Waiting','LOW','Check summary, referrals, results, owner and timescale.',40,'Wait',o))}else if(o.action){tasks.push(task('Prepare one draft reply','Needs Review',o.risk?'RED':'AMBER','Draft prepared from object layers. Do not re-read full text.',90,'Review draft',o))}else tasks.push(task('Filed to Case Manager','Waiting','LOW','No clear action. Kept as case evidence.',100,'None',o));if(o.deadline!=='No clear date found')tasks.push(task('Date found: '+o.deadline,'Needs Review',o.risk?'RED':'AMBER','Confirm whether this is appointment, deadline or information date.',60,'Confirm date',o));if(o.phone)tasks.push(task('Block phone demand','Needs Review','AMBER','Use written-only / no phone wording.',95,'Approve wording',o));if(o.openLoop)tasks.push(task('Open loop watch','Waiting','LOW','Someone may need to reply, arrange, confirm or follow up.',50,'Wait',o));o.tasks=tasks;return o}
function task(title,status,priority,detail,progress,need,o){return{task_id:'TSK-'+Date.now()+'-'+Math.floor(Math.random()*999),title,status,priority,detail,progress,need,estimated_effort:need==='None'?'0 minutes':'2 minutes',ai_completed:['Read input','Created structured object','Linked cases','Checked duplicates','Updated timeline','Prepared next step'],caseNames:o.caseNames,created:new Date().toISOString(),object_id:o.object_id}}
function draftEngine(o){let pro=professionalDraft(o);let easy=easyRead(o);let mum=makeMum(o);o.draft_object={draft_id:'DRAFT-'+Date.now(),layers:{professional:pro,easy_read_summary:easy,chinese_summary_for_mum:mum,sms_short:mum.split('\n').slice(0,5).join('\n'),aac_card:aacCard(o)}};o.draft=pro;o.mum=mum;return o}
function timelineEngine(o){o.timeline_delta={date:new Date().toISOString(),object_id:o.object_id,event_type:o.event_type,source_format:o.source_format,cases:o.caseNames,deadline:o.deadline,evidence_score:o.evidence_score,tasks:o.tasks.map(t=>t.title),draft_id:o.draft_object.draft_id,summary:o.event_type+' linked to '+o.caseNames.join(' / ')};return o}
function recoveryEngine(o){let hours=maxRecovery(o);o.recovery={needed:hours>0,hours,label:hours?hours+' hours suggested':'No recovery block',reason:o.event_type.includes('Appointment')?'Appointment/outing load':'Case-based recovery load'};return o}
function confidenceEngine(o){let score=70;if(o.caseKeys[0]!=='general')score+=10;if(o.deadline!=='No clear date found')score+=8;if(o.action)score+=5;if(o.risk)score+=5;if(o.raw.length>80)score+=5;if(o.event_type!=='Information received')score+=5;o.confidence=Math.min(99,score);o.case_objects.forEach(c=>c.confidence=o.confidence+'%');return o}
function executiveFunctionEngine(o){let load=0;if(o.recovery.needed)load+=35;if(o.action)load+=20;if(o.risk)load+=25;if(o.phone)load+=15;if(jget(STORE.state,{mode:'HOME'}).mode==='RECOVERY')load+=30;o.load=Math.min(100,load);o.delayNonUrgent=o.load>=70&&!o.risk;return o}
function accessibilityValidator(o){let alert=o.risk?'Risk/deadline detected.':o.phone?'Phone barrier detected.':o.action?'One review step may be needed.':'';let needsReview=o.confidence<95&&(o.action||o.risk||o.phone);if(o.delayNonUrgent&&!o.risk){needsReview=false;alert='Demand delayed because recovery/load is high.'}o.next=nextStep(o);if(needsReview)o.output='REVIEW REQUIRED: '+alert+'\n\nWhy this?\n'+why(o)+'\n\nSafest prepared draft:\n\n'+o.draft+'\n\nReview? Yes / No';else o.output='ACTION LOGGED: '+o.event_type+' linked to '+(o.caseNames.join(' / ')||'General')+'. '+o.next;return o}
function commit(o){let objs=jget(STORE.objects,[]);objs.unshift(o);jset(STORE.objects,objs.slice(0,200));let tl=jget(STORE.timeline,[]);tl.unshift(o.timeline_delta);jset(STORE.timeline,tl.slice(0,300));let all=jget(STORE.tasks,[]);o.tasks.forEach(t=>all.unshift(t));jset(STORE.tasks,all.slice(0,250));let drafts=jget(STORE.drafts,[]);drafts.unshift({...o.draft_object,status:'Prepared / not sent',cases:o.caseNames,date:new Date().toISOString()});jset(STORE.drafts,drafts.slice(0,100));let cm=jget(STORE.cases,{});o.case_objects.forEach(c=>{let old=cm[c.case_id]||{name:c.case_name,evidence:[],tasks:[],open_loops:0};old.name=c.case_name;old.status=c.status;old.phase=c.phase;old.owner=c.owner;old.waiting_for=c.waiting_for;old.deadline=o.deadline;old.next=o.next;old.risk=c.risk;old.recovery_impact=c.recovery_impact;old.confidence=c.confidence;old.evidence_score=c.evidence_score;old.updated=c.last_updated;old.open_loops=(old.open_loops||0)+c.open_loops;old.evidence.unshift({date:new Date().toISOString(),object_id:o.object_id,event:o.event_type,score:o.evidence_score,summary:o.output});old.tasks=o.tasks;cm[c.case_id]=old});jset(STORE.cases,cm);let s=jget(STORE.state,{mode:'HOME',recovery_until:0});if(o.recovery.needed){s.recovery_until=Math.max(Number(s.recovery_until||0),Date.now()+o.recovery.hours*3600000);s.mode='RECOVERY'}jset(STORE.state,s);saveLast(o)}
function evidenceScore(o){let score=1;if(/nhs|hscni|trust|gp|hospital|assessment|report|decision|award|referral/i.test(o.raw))score+=2;if(/communication|written|phone|reasonable adjustment|easy read|support|fatigue|pots|autism|pain/i.test(o.raw))score+=2;if(/deadline|urgent|final|risk|safeguard|debt|fraud|repair|leak/i.test(o.raw))score+=1;return Math.min(5,score)}
function ownerFor(k){return{gp:'GP / practice',rheum:'Rheumatology clinic',social:'Social Care',mary:'Mary-Sue',cherry:'Cherrytrees',pip:'DWP / PIP',uc:'Universal Credit',bank:'Bank',housing:'Housing / repairs',dentistry:'Dentist',thyroid:'Healthcare team',oral:'Oral Medicine',travel:'Family / transport',access:'Organisation receiving adjustment request'}[k]||'Unknown'}
function recoveryFor(k,o){let h=maxRecovery({...o,caseKeys:[k]});return h?h+' hours':'No specific block'}
function maxRecovery(o){let h=0;o.caseKeys.forEach(k=>{if(k==='dentistry')h=Math.max(h,RECOVERY.dentist);else if(k==='rheum')h=Math.max(h,RECOVERY.rheum);else if(k==='social'||k==='mary'||k==='cherry')h=Math.max(h,RECOVERY.social);else if(k==='gp')h=Math.max(h,RECOVERY.gp);else if(k==='bank')h=Math.max(h,RECOVERY.bank);else if(k==='pip'||k==='uc')h=Math.max(h,RECOVERY.benefits);else if(k==='travel')h=Math.max(h,RECOVERY.travel)});if(/hospital|southern trust|clinic/i.test(o.raw))h=Math.max(h,RECOVERY.rheum);if(/shopping|restaurant/i.test(o.raw))h=Math.max(h,RECOVERY.shopping);return h}
function findDate(t){let ps=[/\b\d{1,2}[\/\-. ]\d{1,2}[\/\-. ]\d{2,4}\b/,/\b\d{1,2}\s+(January|February|March|April|May|June|July|August|September|October|November|December)\s+\d{4}\b/i,/\b(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday)\s+\d{1,2}\s+(January|February|March|April|May|June|July|August|September|October|November|December)\b/i];for(let p of ps){let m=t.match(p);if(m)return m[0]}return''}
function why(o){if(o.phone)return'Phone communication conflicts with the written-communication accessibility rule.';if(o.event_type.includes('Appointment'))return'Appointment-type inputs need preparation and recovery protection.';if(o.risk)return'There may be a deadline, risk, or consequence if ignored.';return'This can be handled with one prepared step.'}
function nextStep(o){if(o.event_type.includes('Appointment'))return'Prepare appointment pack and protect recovery.';if(o.phone)return'Do not phone. Use written-only draft.';if(o.risk)return'Review safest draft or ask support. Do not ignore.';if(o.action)return'Use prepared draft or keep as one ready task.';return'No action now. Logged to timeline.'}
function professionalDraft(o){let noPhone='Please communicate with me in writing. Telephone contact is not accessible or safe for me.';let base='Please confirm what this means, what action is required, who is responsible, and the deadline or timescale.';if(o.event_type.includes('Appointment'))return'Dear Team,\n\nThank you for the appointment information. Because of my disability-related communication, processing and fatigue difficulties, please provide the appointment details and next steps in writing. Please allow extra processing time, one question at a time, and an Easy Read or simple written summary where possible. If helpful, please use a body chart or visual aids. '+noPhone+'\n\nKind regards,\nMenglu Liu';if(o.phone||o.action||o.risk)return'Dear Team,\n\nThank you for your message. Because of my disability-related communication and processing difficulties, '+base+' '+noPhone+'\n\nKind regards,\nMenglu Liu';return''}
function easyRead(o){return'• This is about: '+(o.caseNames.join(' / ')||'General')+'\n• Type: '+o.event_type+'\n• Date found: '+o.deadline+'\n• Next step: '+nextStep(o)}
function aacCard(o){return'I use this AAC device when burnout, anxiety, PEM, pain, dizziness or overload affect my speech. Please use written communication, one question at a time, and give me extra processing time.'}
function makeMum(o){return'妈妈，简单说：\n\n这条信息属于：'+(o.caseNames.join(' / ')||'General')+'。\n\n类型：'+o.event_type+'。\n\n下一步：'+nextStep(o)+'\n\n日期/截止时间：'+o.deadline+'\n\nPA 已经保存并生成任务。如果需要回复，会准备英文草稿。请不要让我打电话。'}
function saveLast(o){jset(STORE.last,o)}
function showResult(txt,o){app.innerHTML='';app.appendChild(card('Binary Output',txt));app.appendChild(grid([['👩 Copy Mum',()=>{copy((o&&o.mum)||'');out('Copied Chinese summary for Mum.')} ,'primary'],['📋 Copy Draft',()=>{copy((o&&o.draft)||'');out('Copied professional draft. Review before sending.')}],['🧩 Show Object',()=>objectView(o),'primary'],['✅ Tasks',tasksView],['🧠 Cases',cases],['↩ Intake',intake]]));let d=el('div','card out');d.id='out';if(o)d.textContent='Object: '+o.object_id+'\nEvent: '+o.event_type+'\nConfidence: '+o.confidence+'%\nLoad: '+o.load+'%\nEvidence score: '+o.evidence_score+'/5\nRecovery: '+o.recovery.label+'\n\nTasks:\n- '+o.tasks.map(t=>t.title+' ('+t.status+')').join('\n- ');app.appendChild(d)}
function objectView(o){if(!o){last();return}app.innerHTML='';app.appendChild(card('Structured Object',JSON.stringify({intake_id:o.intake_id,object_id:o.object_id,event_type:o.event_type,source_format:o.source_format,cases:o.caseNames,case_objects:o.case_objects,tasks:o.tasks,draft_object:o.draft_object,recovery:o.recovery,confidence:o.confidence,output:o.output},null,2)));app.appendChild(grid([['Copy Object JSON',()=>{copy(JSON.stringify(o,null,2));out('Object JSON copied.')} ,'primary'],['Back to Result',()=>showResult(o.output,o)],['Tasks',tasksView],['Timeline',timeline]]));let d=el('div','card out');d.id='out';app.appendChild(d)}
function tasksView(){let all=jget(STORE.tasks,[]);app.innerHTML='';app.appendChild(card('Task Intelligence','Tasks show what AI already completed and what, if anything, Menglu needs to review.'));if(!all.length)app.appendChild(card('No tasks yet','Use Intake first.'));all.slice(0,50).forEach(t=>{let c=el('div','card');c.innerHTML='<b>'+esc(t.title)+'</b><div class="small">'+esc(t.status)+' · '+esc(t.priority||'')+' · '+esc(t.estimated_effort||'')+'</div>'+progress(t.progress||0)+'<div class="out">AI already completed:\n✓ '+esc((t.ai_completed||[]).join('\n✓ '))+'\n\nNeed from Menglu:\n□ '+esc(t.need||'None')+'\n\n'+esc(t.detail||'')+'</div>';app.appendChild(c)});app.appendChild(grid([['🏠 Dashboard',dashboard,'primary'],['🪄 Intake',intake],['🧠 Cases',cases],['Clear completed',()=>{let keep=all.filter(t=>t.status!=='Done');jset(STORE.tasks,keep);tasksView()}]]))}
function cases(){let cm=jget(STORE.cases,{});let vals=Object.values(cm).sort((a,b)=>(b.updated||'').localeCompare(a.updated||''));app.innerHTML='';app.appendChild(card('Case Objects','Each case tracks phase, owner, waiting, confidence, evidence score, recovery and tasks.'));if(!vals.length)app.appendChild(card('No cases yet','Use Intake first.'));vals.forEach(c=>app.appendChild(card(c.name,'Phase: '+(c.phase||'')+'\nOwner: '+(c.owner||'')+'\nWaiting for: '+(c.waiting_for||'')+'\nDeadline: '+(c.deadline||'')+'\nNext: '+(c.next||'')+'\nRisk: '+(c.risk||'')+'\nRecovery: '+(c.recovery_impact||'')+'\nConfidence: '+(c.confidence||'')+'\nEvidence score: '+(c.evidence_score||'')+'/5\nEvidence items: '+(c.evidence?.length||0)+'\nUpdated: '+(c.updated||''))));app.appendChild(grid([['🏠 Dashboard',dashboard,'primary'],['🪄 Intake',intake],['✅ Tasks',tasksView],['🧾 Timeline',timeline]]))}
function timeline(){let tl=jget(STORE.timeline,[]);app.innerHTML='';app.appendChild(card('Relation-Linked Timeline','Unified ledger: object → event → evidence → case → task → draft → outcome.'));if(!tl.length)app.appendChild(card('No timeline yet','Use Intake first.'));tl.slice(0,40).forEach(x=>app.appendChild(card((x.date||'')+' · '+(x.event_type||''),(x.cases||[]).join(' / ')+'\nObject: '+(x.object_id||'')+'\n'+(x.summary||'')+'\nDeadline: '+(x.deadline||'')+'\nEvidence score: '+(x.evidence_score||'')+'/5\nDraft: '+(x.draft_id||''))));app.appendChild(grid([['🏠 Dashboard',dashboard,'primary'],['🧠 Cases',cases],['✅ Tasks',tasksView],['📋 Last',last]]))}
function stateView(){let s=jget(STORE.state,{mode:'HOME',recovery_until:0,outings:0});let rec=Number(s.recovery_until||0)>Date.now();screen('State / Recovery','Mode: '+(s.mode||'HOME')+'\nRecovery active: '+(rec?'YES':'NO')+'\n\nRecovery blocks are created from object type and case load. Optional Benefits, Banking and Housing work should stay hidden unless urgent/statutory.',[['Start 48h Recovery',()=>{s.mode='RECOVERY';s.recovery_until=Date.now()+48*3600000;jset(STORE.state,s);stateView()},'danger'],['End Recovery',()=>{s.mode='HOME';s.recovery_until=0;jset(STORE.state,s);stateView()}],['🏠 Dashboard',dashboard,'primary'],['✅ Tasks',tasksView]])}
function last(){let x=jget(STORE.last,null);if(!x){intake();return}showResult(x.output||x.result||'Last item loaded.',x)}
function calcLoad(){let s=jget(STORE.state,{mode:'HOME',recovery_until:0}),tasks=jget(STORE.tasks,[]),load=tasks.filter(t=>t.status==='Needs Review').length*18+tasks.filter(t=>t.priority==='RED').length*25;if(Number(s.recovery_until||0)>Date.now())load+=35;return Math.min(100,load)}
function apps(){screen('Apps','Unified OS front end. Mellow speaks, Mira timeline stores, Menglu OS creates structured objects and decides.',[['🐻 Mellow',()=>location.href='../','primary'],['✨ Mira',()=>location.href='../mira-next/'],['🏠 Dashboard',dashboard,'primary'],['🚦 State',stateView],['🧾 Timeline',timeline]])}
document.getElementById('bDash').addEventListener('click',dashboard);document.getElementById('bIntake').addEventListener('click',intake);document.getElementById('bTasks').addEventListener('click',tasksView);document.getElementById('bCases').addEventListener('click',cases);document.getElementById('bApps').addEventListener('click',apps);jset(STORE.profile,PROFILE);dashboard();
</script></body></html>
