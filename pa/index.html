<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#315f9f"><link rel="manifest" href="manifest.json"><link rel="icon" href="pa-icon.svg"><link rel="apple-touch-icon" href="pa-icon.svg"><title>Menglu PA</title><style>:root{--bg:#f8fbff;--card:#fff;--line:#d9d8ee;--ink:#111;--blue:#315f9f;--red:#a40000;--soft:#eef7ff;--pink:#fff3f8}*{box-sizing:border-box}body{font-family:Arial,sans-serif;margin:0;background:linear-gradient(180deg,var(--bg),#fff8fc);color:var(--ink);padding:12px 12px 86px;max-width:760px}h1{font-size:25px;margin:4px 0}h2{font-size:21px;margin:10px 0}.top{display:flex;gap:10px;align-items:center}.logo{width:52px;height:52px;border-radius:16px}.tag{font-size:13px;border:1px solid var(--line);border-radius:999px;padding:5px 8px;background:white}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;box-shadow:0 2px 10px rgba(49,95,159,.06)}.soft{background:linear-gradient(135deg,var(--soft),var(--pink))}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}button{width:100%;font-size:16px;line-height:1.22;padding:12px;border:1px solid #bbb;border-radius:15px;background:#fff;text-align:left;min-height:58px}button.primary{border:2px solid var(--blue);color:var(--blue);font-weight:700;background:#f4f9ff}button.danger{border:2px solid var(--red);color:var(--red);font-weight:700;background:#fff7f7}input,textarea,select{width:100%;font-size:17px;padding:12px;margin:6px 0 10px;border:1px solid #aaa;border-radius:12px;background:#fff}.out{white-space:pre-wrap;font-size:17px;line-height:1.45}.small{font-size:14px;color:#555;line-height:1.35}.bottom{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;background:rgba(255,255,255,.96);border-top:1px solid var(--line);padding:6px;max-width:760px;margin:auto}.bottom button{font-size:12px;text-align:center;padding:8px 2px;min-height:44px;border-radius:12px}.pill{display:inline-block;background:#eef7ff;border:1px solid var(--line);border-radius:999px;padding:4px 8px;margin:2px;font-size:13px}@media(max-width:330px){.grid{grid-template-columns:1fr}button{font-size:15px}}</style></head><body><div class="top"><img src="pa-icon.svg" class="logo" alt=""><div><h1>Menglu PA</h1><div class="tag">Personal Accessibility Assistant</div></div></div><main id="app"></main><nav class="bottom"><button onclick="home()">🏠<br>Home</button><button onclick="inbox()">✉️<br>Email</button><button onclick="calendarTool()">📅<br>Calendar</button><button onclick="mum()">中文<br>Mum</button><button onclick="emergency()">🆘<br>Help</button></nav><script>const app=document.getElementById('app');const K={log:'pa_log',email:'pa_email',appt:'pa_appt',mum:'pa_mum'};function arr(k){try{return JSON.parse(localStorage[k]||'[]')}catch(e){return[]}}function add(k,o){let a=arr(k);o.date=new Date().toLocaleString('en-GB');a.unshift(o);localStorage[k]=JSON.stringify(a)}function v(id){return document.getElementById(id)?.value.trim()||''}function set(id,t){let e=document.getElementById(id);if(e)e.textContent=t}function copy(t){navigator.clipboard.writeText(t).catch(()=>{})}function grid(x){return '<div class="grid">'+x.map(i=>'<button class="'+(i[2]||'')+'" onclick="'+i[1]+'">'+i[0]+'</button>').join('')+'</div>'}function shell(t,b){app.innerHTML='<div class="card soft"><b>'+t+'</b><p class="small">iPhone-friendly PA tools: email review, calendar file, WeChat Mandarin summary, document reply, recovery support.</p></div>'+b}function home(){shell('Today',grid([['✉️ Review email / letter','inbox()','primary'],['📅 Add appointment','calendarTool()','primary'],['🇨🇳 Tell Mum in Mandarin','mum()'],['📄 Document pipeline','documentPipe()'],['🛡 Phone-call blocker','phoneBlock()'],['🆘 Emergency support','emergency()','danger']])+'<div class="card small"><b>Saved today</b><br>Email drafts: '+arr(K.email).length+' | Appointments: '+arr(K.appt).length+' | Mum summaries: '+arr(K.mum).length+'</div>')}function inbox(){shell('Email / Letter Review','<div class="card"><textarea id="emailText" rows="8" placeholder="Paste email or letter here"></textarea>'+grid([['Paste from clipboard','pasteTo(\'emailText\')'],['Review + draft reply','reviewEmail()','primary']])+'</div><div id="out" class="card out"></div>')}async function pasteTo(id){let e=document.getElementById(id);try{e.value=await navigator.clipboard.readText();e.focus()}catch(x){e.focus();alert('Clipboard blocked. Paste manually.')}}function kind(x){let s=x.toLowerCase();if(s.includes('appointment')||s.includes('clinic')||s.includes('hospital')||s.includes('nhs'))return 'healthcare';if(s.includes('universal credit')||s.includes('pip')||s.includes('dwp'))return 'benefits';if(s.includes('bank')||s.includes('payment'))return 'bank';if(s.includes('repair')||s.includes('housing'))return 'housing';return 'general'}function reviewEmail(){let x=v('emailText'),k=kind(x);let r='EMAIL REVIEW\n\nType: '+k+'\nUrgency: check for deadline/action needed\n\nEasy Read:\n1. What this means:\n2. What I need to do:\n3. Deadline:\n4. Risk if I do nothing:\n5. Safest next step:\n\nDraft reply:\nDear Team,\n\nThank you for your message. Because of my disability-related communication and processing difficulties, please continue in writing and confirm the next step, who is responsible, and the timescale.\n\nKind regards,\nMenglu Liu\n\nOriginal text:\n'+x;set('out',r);add(K.email,{type:k,text:r})}function calendarTool(){shell('Calendar Assistant','<div class="card"><input id="ctitle" placeholder="Appointment title"><input id="cdate" type="date"><input id="ctime" type="time"><input id="cloc" placeholder="Location"><textarea id="cnotes" rows="3" placeholder="Notes / bring / questions"></textarea>'+grid([['Create calendar file','makeICS()','primary'],['Create recovery reminder text','recoveryText()']])+'</div><div id="out" class="card out"></div>')}function makeICS(){let title=v('ctitle')||'Appointment',date=v('cdate'),time=v('ctime')||'10:00',loc=v('cloc'),notes=v('cnotes');if(!date){set('out','Choose a date first.');return}let dt=date.replaceAll('-','')+'T'+time.replace(':','')+'00';let ics='BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nSUMMARY:'+title+'\nDTSTART:'+dt+'\nDURATION:PT1H\nLOCATION:'+loc+'\nDESCRIPTION:Bring notes. Written communication. Plan recovery. '+notes+'\nEND:VEVENT\nEND:VCALENDAR';let blob=new Blob([ics],{type:'text/calendar'});let url=URL.createObjectURL(blob);document.getElementById('out').innerHTML='Calendar file ready. Tap link, then Add to Calendar.\n\n<a href="'+url+'" download="appointment.ics">📅 Add to Calendar file</a>';add(K.appt,{title,date,time,loc,notes})}function recoveryText(){let t='After this appointment, plan 48 hours recovery. Avoid phone calls, banking, forms, difficult decisions and extra admin.';set('out',t);copy(t)}function mum(){shell('Tell Mum in Mandarin','<div class="card"><textarea id="mumIn" rows="7" placeholder="Paste appointment notes / what happened"></textarea>'+grid([['Paste notes','pasteTo(\'mumIn\')'],['Generate WeChat Mandarin','makeMum()','primary']])+'</div><div id="out" class="card out"></div>')}function makeMum(){let x=v('mumIn');let m='妈妈，今天的情况简单说：\n\n1. 今天发生了什么：\n'+(x||'我需要补充具体内容。')+'\n\n2. 下一步：\n请帮我看是否有需要回复、预约、等信或准备材料。\n\n3. 我现在需要：\n安静休息，减少追问。如果我说不清楚，不是不想说，是脑子处理不过来。\n\n4. 重要提醒：\n如果是预约或很累的一天，后面1-2天可能会更累。';set('out',m);copy(m);add(K.mum,{text:m})}function documentPipe(){shell('Document Pipeline','<div class="card"><textarea id="doc" rows="8" placeholder="Paste any document"></textarea>'+grid([['Paste','pasteTo(\'doc\')'],['Classify + next action','pipeDoc()','primary']])+'</div><div id="out" class="card out"></div>')}function pipeDoc(){let x=v('doc'),k=kind(x);let msg='Detected: '+k+'\n\nNext action checklist:\n□ Is there a deadline?\n□ Does it need a reply?\n□ Add appointment if date/time is mentioned.\n□ Tell Mum if support is needed.\n□ Save as open loop until closed.\n\nSuggested reply:\nPlease provide this information in writing, with clear next steps, responsibility and timescale.';set('out',msg);add(K.log,{type:k,text:msg})}function phoneBlock(){let t='Because of my disability-related communication difficulties, telephone calls are not accessible or safe for me. Please continue by email or letter. Please provide clear written information, one issue at a time, with next steps, responsibility and timescale. Thank you.';shell('Phone-call blocker','<div class="card out" id="block">'+t+'</div>'+grid([['Copy text',"copy(document.getElementById('block').textContent)",'primary'],['Speak it',"say(document.getElementById('block').textContent)"]]))}function emergency(){shell('Emergency','<div class="card out" id="help">I need help communicating. I may have reduced speech, brain fog, dizziness, severe fatigue or sensory overload. Please use written communication, ask one question at a time, give extra processing time, reduce noise and pressure, and do not assume I am refusing because I cannot answer.</div>'+grid([['Speak','say(document.getElementById(\'help\').textContent)','danger'],['Copy','copy(document.getElementById(\'help\').textContent)'],['Open AAC','location.href=\'../\'','primary']]))}function say(t){if('speechSynthesis'in window){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='en-GB';u.rate=.82;speechSynthesis.speak(u)}else alert(t)}home();</script></body></html>
