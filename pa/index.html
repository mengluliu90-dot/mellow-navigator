<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#315f9f"><link rel="manifest" href="manifest.json"><link rel="icon" href="pa-icon.svg"><link rel="apple-touch-icon" href="pa-icon.svg"><title>Menglu OS</title><style>:root{--bg:#f8fbff;--card:#fff;--line:#d9d8ee;--ink:#111;--blue:#315f9f;--red:#9b111e;--green:#166534;--soft:#eef7ff;--pink:#fff3f8}*{box-sizing:border-box}body{font-family:Arial,sans-serif;margin:0;background:linear-gradient(180deg,var(--bg),#fff8fc);color:var(--ink);padding:12px 12px 90px;max-width:760px}h1{font-size:24px;margin:4px 0}.top{display:flex;gap:10px;align-items:center}.logo{width:52px;height:52px;border-radius:16px}.tag{font-size:13px;border:1px solid var(--line);border-radius:999px;padding:5px 8px;background:#fff}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;box-shadow:0 2px 10px rgba(49,95,159,.06)}.soft{background:linear-gradient(135deg,var(--soft),var(--pink))}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}button{width:100%;font-size:16px;line-height:1.22;padding:12px;border:1px solid #bbb;border-radius:15px;background:#fff;text-align:left;min-height:58px}button.primary{border:2px solid var(--blue);color:var(--blue);font-weight:700;background:#f4f9ff}button.danger{border:2px solid var(--red);color:var(--red);font-weight:700;background:#fff7f7}button.green{border:2px solid var(--green);color:var(--green);font-weight:700;background:#f4fff7}textarea,input{width:100%;font-size:17px;padding:12px;margin:6px 0 10px;border:1px solid #aaa;border-radius:12px;background:#fff}.out{white-space:pre-wrap;font-size:17px;line-height:1.45}.small{font-size:14px;color:#555;line-height:1.35}.bottom{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;background:rgba(255,255,255,.96);border-top:1px solid var(--line);padding:6px;max-width:760px;margin:auto}.bottom button{font-size:12px;text-align:center;padding:8px 2px;min-height:44px;border-radius:12px}@media(max-width:330px){.grid{grid-template-columns:1fr}}</style></head><body><div class="top"><img src="pa-icon.svg" class="logo" alt=""><div><h1>Menglu OS</h1><div class="tag">Unified 10-engine Case Manager</div></div></div><main id="app"><div class="card soft">Loading...</div></main><nav class="bottom"><button id="bIntake">🪄<br>Intake</button><button id="bCases">🧠<br>Cases</button><button id="bTimeline">🧾<br>Timeline</button><button id="bState">🚦<br>State</button><button id="bApps">🔗<br>Apps</button></nav><script>
const app=document.getElementById('app');
const STORE={cases:'uos_cases',timeline:'uos_timeline',last:'uos_last',profile:'uos_profile',state:'uos_state',learn:'uos_learning'};
const CASES={rheum:['Rheumatology / hEDS',/rheumatology|heds|hsd|hypermobility|joint|beighton|pain|pots/i],gp:['GP',/\bgp\b|doctor|practice|banbridge group|dr cullen|dr dillon|dr mcniff/i],social:['Social Care',/social care|care plan|assessment|support worker/i],mary:['Mary-Sue',/mary-sue|mary sue|ohare|o’hare/i],cherry:['Cherrytrees',/cherrytrees|physical disability team/i],pip:['PIP',/\bpip\b|personal independence payment|mandatory reconsideration|tribunal|assessment/i],uc:['Universal Credit',/universal credit|\buc\b|lcwra|appointee|work coach|mollie/i],bank:['Banking',/aib|bank|payment|direct debit|standing order|chargeback|refund|lcs|1st locate|debt|fraud|scam/i],housing:['Housing',/housing|repair|lotus|clixifix|leak|water ingress|alarm|boiler|plumber|electric|lights/i],dentistry:['Dentistry',/dentist|dental|tooth|gum|catherine|claire/i],thyroid:['Thyroid',/thyroid|nodule|ultrasound|endocrine/i],oral:['Oral Medicine',/oral medicine|burning mouth|tmj|jaw|mouth/i]};
const PROFILE={written:'Phone calls are an accessibility barrier. Use written communication.',easy:'Request Easy Read or simple written summary.',recovery:'Appointments and outings require about 48 hours recovery.',outing:'Out-of-home activity should be limited to about 2 days per week.',masking:'Masking may make difficulties appear less severe. Supported functioning is not independent functioning.',visual:'Ask for body chart or visual aids where helpful.'};
function jget(k,d){try{return JSON.parse(localStorage[k]||JSON.stringify(d))}catch(e){return d}}
function jset(k,v){localStorage[k]=JSON.stringify(v)}
function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function el(tag,cls,txt){let x=document.createElement(tag);if(cls)x.className=cls;if(txt!==undefined)x.textContent=txt;return x}
function card(t,b){let c=el('div','card');if(t){let h=document.createElement('b');h.textContent=t;c.appendChild(h)}if(b){let d=el('div','out',b);c.appendChild(d)}return c}
function btn(label,fn,cls=''){let b=document.createElement('button');b.className=cls;b.innerHTML=label;b.addEventListener('click',fn);return b}
function grid(items){let g=el('div','grid');items.forEach(i=>g.appendChild(btn(i[0],i[1],i[2]||'')));return g}
function screen(t,b,items=[]){app.innerHTML='';let c=card(t,b);c.classList.add('soft');app.appendChild(c);if(items.length)app.appendChild(grid(items))}
function copy(t){navigator.clipboard?.writeText(t).catch(()=>{})}
function out(t){let o=document.getElementById('out');if(!o){o=el('div','card out');o.id='out';app.appendChild(o)}o.textContent=t}
function intake(){app.innerHTML='';app.appendChild(card('Unified Intake','Paste anything. The 10-engine pipeline will classify, link cases, de-duplicate, add timeline evidence, create tasks, prepare a draft, and show one safest action only.'));let ta=document.createElement('textarea');ta.id='txt';ta.rows=8;ta.placeholder='Paste email, letter, appointment, screenshot text, message, or file text here.';app.appendChild(ta);let f=document.createElement('input');f.type='file';f.accept='image/*,.pdf,.txt,.doc,.docx';f.addEventListener('change',()=>out('File selected. On iPhone, use Live Text to copy image text into the box, or upload the image directly to ChatGPT for image reading.'));app.appendChild(f);app.appendChild(grid([['🪄 Process Clipboard',async()=>{try{let t=await navigator.clipboard.readText();ta.value=t;runPipeline(t)}catch(e){out('Clipboard blocked. Copy text first, then try again.')}},'primary'],['✅ Process Intake',()=>runPipeline(ta.value),'primary'],['🧠 Case Buckets',cases],['📋 Last Result',last]]));let o=el('div','card out');o.id='out';app.appendChild(o)}
function runPipeline(text){if(!text||!text.trim()){out('Nothing to process. Paste text first.');return}let obj=intakeEngine(text),rel=relationshipEngine(obj),dedup=evidenceEngine(rel);if(dedup.duplicate){let msg='ACTION LOGGED: Already tracked. No new action.';saveLast({format:'A',result:msg});return showResult(msg,null)}let tl=timelineEngine(dedup),contr=contradictionEngine(tl),conf=confidenceEngine(contr),st=stateEngine(conf),learn=learningEngine(st),ef=executiveFunctionEngine(learn),valid=accessibilityValidator(ef);commit(valid);showResult(valid.output,valid)}
function intakeEngine(text){let low=text.toLowerCase(),type='Other';if(/from:|subject:|dear|regards|unsubscribe/i.test(text))type='Email/Letter';if(/appointment|clinic|attend|calendar|date|time/i.test(text))type='Appointment/Calendar';if(/pdf|scan|report|result|blood test|ultrasound/i.test(text))type='Medical Report/File';if(/bank|payment|statement|direct debit|refund/i.test(text))type='Bank Statement/Finance';return{text,low,type,ts:new Date().toISOString()}}
function relationshipEngine(o){let keys=Object.keys(CASES).filter(k=>CASES[k][1].test(o.text));if(!keys.length)keys=['general'];o.caseKeys=keys;o.caseNames=keys.map(k=>CASES[k]?.[0]||'General');return o}
function evidenceEngine(o){let tl=jget(STORE.timeline,[]);let sig=(o.text||'').slice(0,180).toLowerCase().replace(/\s+/g,' ');o.signature=sig;o.duplicate=tl.some(x=>x.signature===sig);return o}
function timelineEngine(o){o.deadline=findDate(o.text)||'No clear date found';o.appointment=/appointment|clinic|attend|hospital|gp|dentist|rheumatology|blood test|scan|review/i.test(o.text);o.phone=/phone|call|telephone/i.test(o.text);o.action=/reply|required|complete|return|confirm|book|attend|deadline|before|by |contact|provide|send|submit|form/i.test(o.text)||o.appointment;o.risk=/urgent|final|overdue|missed|debt|fraud|scam|cancel|suspend|deadline|termination|failure to/i.test(o.text);o.openLoop=/will contact|waiting|referral|follow up|respond|reply|investigation|review|arrange|book|confirm|promise/i.test(o.text);return o}
function contradictionEngine(o){o.breaches=[];if(o.phone)o.breaches.push('Phone/call demand conflicts with written-only communication need.');if(o.appointment&&!/written|summary|easy read|adjustment/i.test(o.text))o.breaches.push('Appointment may not include reasonable adjustments yet.');if(/will contact|referral|arrange/i.test(o.text))o.breaches.push('Open loop created: future chase may be needed.');return o}
function confidenceEngine(o){let score=70;if(o.caseKeys[0]!=='general')score+=10;if(o.deadline!=='No clear date found')score+=8;if(o.action)score+=5;if(o.risk)score+=5;if(o.text.length>80)score+=5;o.confidence=Math.min(99,score);return o}
function stateEngine(o){let s=jget(STORE.state,{mode:'HOME',recovery_until:0,outings:0});if(o.appointment){s.mode='PREPARING';s.recovery_until=Date.now()+48*3600000}if(Number(s.recovery_until||0)>Date.now())s.mode='RECOVERY';o.state=s;jset(STORE.state,s);return o}
function learningEngine(o){let l=jget(STORE.learn,{rules:['Always use written communication','Always request Easy Read where useful','Always protect recovery after appointments']});o.learning=l;return o}
function executiveFunctionEngine(o){let load=0;if(o.appointment)load+=50;if(o.action)load+=20;if(o.risk)load+=25;if(o.phone)load+=15;if(o.state.mode==='RECOVERY')load+=30;o.load=Math.min(100,load);o.delayNonUrgent=o.load>=70&&!o.risk;return o}
function accessibilityValidator(o){let one=nextStep(o),draft=makeDraft(o);let tasks=makeTasks(o);let mum=makeMum(o);let alert=o.risk?'Risk/deadline detected.':o.phone?'Phone barrier detected.':o.action?'One review step may be needed.':'';let needsReview=o.confidence<95&&(o.action||o.risk||o.phone);if(o.delayNonUrgent&&!o.risk){needsReview=false;alert='Demand is delayed because recovery/load is high.'}o.tasks=tasks;o.mum=mum;o.draft=draft;o.next=one;if(needsReview)o.output='REVIEW REQUIRED: '+alert+'\n\nSafest prepared draft:\n\n'+draft+'\n\nReview? Yes / No';else o.output='ACTION LOGGED: '+(o.caseNames.join(' / ')||'General')+' updated in timeline; '+one;return o}
function commit(o){let tl=jget(STORE.timeline,[]);tl.unshift({date:new Date().toISOString(),type:o.type,cases:o.caseNames,summary:o.output,signature:o.signature,deadline:o.deadline,tasks:o.tasks,load:o.load});jset(STORE.timeline,tl);let cm=jget(STORE.cases,{});o.caseKeys.forEach(k=>{let name=CASES[k]?.[0]||'General';let c=cm[k]||{name,status:'Active',evidence:[],tasks:[]};c.updated=new Date().toISOString();c.phase=o.appointment?'Appointment / preparation':o.openLoop?'Waiting / open loop':o.action?'Action review':'Evidence / waiting';c.waiting_for=o.openLoop?'External service / future response':(o.action?'Menglu review only if needed':'No action now');c.deadline=o.deadline;c.next=o.next;c.risks=o.breaches;c.evidence.unshift({date:new Date().toISOString(),type:o.type,summary:o.output});c.tasks=o.tasks;cm[k]=c});jset(STORE.cases,cm);saveLast(o)}
function saveLast(o){jset(STORE.last,o)}
function findDate(t){let ps=[/\b\d{1,2}[\/\-. ]\d{1,2}[\/\-. ]\d{2,4}\b/,/\b\d{1,2}\s+(January|February|March|April|May|June|July|August|September|October|November|December)\s+\d{4}\b/i,/\b(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday)\s+\d{1,2}\s+(January|February|March|April|May|June|July|August|September|October|November|December)\b/i];for(let p of ps){let m=t.match(p);if(m)return m[0]}return''}
function nextStep(o){if(o.appointment)return'Prepare appointment pack and protect 48-hour recovery.';if(o.phone)return'Do not phone. Use written-only draft.';if(o.risk)return'Review safest draft or ask support. Do not ignore.';if(o.action)return'Use prepared draft or keep as one ready task.';return'No action now. Logged to timeline.'}
function makeTasks(o){let t=[];t.push('Link evidence to '+(o.caseNames.join(' / ')||'General'));if(o.appointment){t.push('Prepare Mellow/AAC appointment script');t.push('Request Easy Read/written summary and visual aids if useful');t.push('Create 48-hour recovery block');t.push('Post-appointment follow-up check')}else if(o.action)t.push('Prepare one draft reply for review');if(o.phone)t.push('Block phone demand: written-only wording');if(o.openLoop)t.push('Open loop: chase later if no response');return t}
function makeDraft(o){let noPhone='Please communicate with me in writing. Telephone contact is not accessible or safe for me.';let base='Please confirm what this means, what action is required, who is responsible, and the deadline or timescale.';if(o.appointment)return'Dear Team,\n\nThank you for the appointment information. Because of my disability-related communication, processing and fatigue difficulties, please provide the appointment details and next steps in writing. Please also allow extra processing time, one question at a time, and an Easy Read or simple written summary where possible. '+noPhone+'\n\nKind regards,\nMenglu Liu';if(o.phone||o.action||o.risk)return'Dear Team,\n\nThank you for your message. Because of my disability-related communication and processing difficulties, '+base+' '+noPhone+'\n\nKind regards,\nMenglu Liu';return''}
function makeMum(o){return'妈妈，简单说：\n\n这条信息属于：'+(o.caseNames.join(' / ')||'General')+'。\n\n重点：'+nextStep(o)+'\n\n日期/截止时间：'+o.deadline+'\n\nPA 已经保存到时间线。如果需要回复，会准备英文草稿。请不要让我打电话。'}
function showResult(txt,o){app.innerHTML='';app.appendChild(card('Binary Output',txt));let items=[['👩 Copy Mum',()=>{copy((o&&o.mum)||'');out('Copied Chinese summary for Mum.')} ,'primary'],['📋 Copy Draft',()=>{copy((o&&o.draft)||'');out('Copied draft. Review before sending.')}],['🧠 Cases',cases],['🧾 Timeline',timeline],['↩ Intake',intake]];app.appendChild(grid(items));let d=el('div','card out');d.id='out';if(o)d.textContent='Confidence: '+o.confidence+'%\nState: '+o.state.mode+'\nLoad: '+o.load+'%\nTasks:\n- '+o.tasks.join('\n- ');app.appendChild(d)}
function cases(){let cm=jget(STORE.cases,{});let vals=Object.values(cm).sort((a,b)=>(b.updated||'').localeCompare(a.updated||''));app.innerHTML='';app.appendChild(card('Case Buckets','12 active case buckets. Everything new is linked here instead of being treated as isolated.'));if(!vals.length)app.appendChild(card('No cases yet','Use Intake first.'));vals.forEach(c=>app.appendChild(card(c.name,'Phase: '+(c.phase||'')+'\nWaiting for: '+(c.waiting_for||'')+'\nDeadline: '+(c.deadline||'')+'\nNext: '+(c.next||'')+'\nEvidence items: '+(c.evidence?.length||0)+'\nUpdated: '+(c.updated||''))));app.appendChild(grid([['🪄 Intake',intake,'primary'],['🧾 Timeline',timeline],['🚦 State',state]]))}
function timeline(){let tl=jget(STORE.timeline,[]);app.innerHTML='';app.appendChild(card('Life Event Timeline','Unified chronological ledger for evidence, tasks, logs and state transitions.'));if(!tl.length)app.appendChild(card('No timeline yet','Use Intake first.'));tl.slice(0,30).forEach(x=>app.appendChild(card((x.date||'')+' · '+(x.type||''),(x.cases||[]).join(' / ')+'\n'+(x.summary||'')+'\nDeadline: '+(x.deadline||''))));app.appendChild(grid([['🪄 Intake',intake,'primary'],['🧠 Cases',cases],['📋 Last',last]]))}
function state(){let s=jget(STORE.state,{mode:'HOME',recovery_until:0,outings:0});let rec=Number(s.recovery_until||0)>Date.now();screen('State Engine','Mode: '+(s.mode||'HOME')+'\nRecovery active: '+(rec?'YES':'NO')+'\n\nWhen recovery is active, optional Benefits, Banking and Housing work should be hidden unless urgent/statutory.',[['Start 48h Recovery',()=>{s.mode='RECOVERY';s.recovery_until=Date.now()+48*3600000;jset(STORE.state,s);state()},'danger'],['End Recovery',()=>{s.mode='HOME';s.recovery_until=0;jset(STORE.state,s);state()}],['🪄 Intake',intake,'primary'],['🧠 Cases',cases]])}
function last(){let x=jget(STORE.last,null);if(!x){intake();return}showResult(x.output||x.result||'Last item loaded.',x)}
function apps(){screen('Apps','Unified OS front end. Mellow speaks, Mira timeline stores, PA Case Manager decides.',[['🐻 Mellow',()=>location.href='../','primary'],['✨ Mira',()=>location.href='../mira-next/'],['🪄 Intake',intake,'primary'],['🧠 Cases',cases],['🚦 State',state]])}
document.getElementById('bIntake').addEventListener('click',intake);document.getElementById('bCases').addEventListener('click',cases);document.getElementById('bTimeline').addEventListener('click',timeline);document.getElementById('bState').addEventListener('click',state);document.getElementById('bApps').addEventListener('click',apps);jset(STORE.profile,PROFILE);intake();
</script></body></html>
