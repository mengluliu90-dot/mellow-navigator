<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#315f9f"><link rel="manifest" href="manifest.json"><link rel="icon" href="pa-icon.svg"><link rel="apple-touch-icon" href="pa-icon.svg"><title>Menglu PA</title><style>:root{--bg:#f8fbff;--card:#fff;--line:#d9d8ee;--ink:#111;--blue:#315f9f;--red:#a40000;--green:#166534;--soft:#eef7ff;--pink:#fff3f8}*{box-sizing:border-box}body{font-family:Arial,sans-serif;margin:0;background:linear-gradient(180deg,var(--bg),#fff8fc);color:var(--ink);padding:12px 12px 88px;max-width:760px}h1{font-size:24px;margin:4px 0}.top{display:flex;gap:10px;align-items:center}.logo{width:52px;height:52px;border-radius:16px}.tag{font-size:13px;border:1px solid var(--line);border-radius:999px;padding:5px 8px;background:#fff}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;box-shadow:0 2px 10px rgba(49,95,159,.06)}.soft{background:linear-gradient(135deg,var(--soft),var(--pink))}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}button{width:100%;font-size:16px;line-height:1.22;padding:12px;border:1px solid #bbb;border-radius:15px;background:#fff;text-align:left;min-height:58px}button.primary{border:2px solid var(--blue);color:var(--blue);font-weight:700;background:#f4f9ff}button.danger{border:2px solid var(--red);color:var(--red);font-weight:700;background:#fff7f7}button.green{border:2px solid var(--green);color:var(--green);font-weight:700;background:#f4fff7}input,textarea{width:100%;font-size:17px;padding:12px;margin:6px 0 10px;border:1px solid #aaa;border-radius:12px;background:#fff}.out{white-space:pre-wrap;font-size:17px;line-height:1.45}.small{font-size:14px;color:#555;line-height:1.35}.bottom{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;background:rgba(255,255,255,.96);border-top:1px solid var(--line);padding:6px;max-width:760px;margin:auto}.bottom button{font-size:12px;text-align:center;padding:8px 2px;min-height:44px;border-radius:12px}.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:4px 8px;margin:3px;background:#fff}.redtext{color:var(--red);font-weight:700}@media(max-width:330px){.grid{grid-template-columns:1fr}}</style></head><body><div class="top"><img src="pa-icon.svg" class="logo" alt=""><div><h1>Menglu PA</h1><div class="tag">Case Manager Core · buttons fixed</div></div></div><main id="app"><div class="card soft">Loading PA...</div></main><nav class="bottom"><button id="navIntake">🪄<br>Intake</button><button id="navCases">🧠<br>Cases</button><button id="navLast">📋<br>Last</button><button id="navPace">🚦<br>Pace</button><button id="navApps">🔗<br>Apps</button></nav><script>
const app=document.getElementById('app');
const K={ready:'pa_ready',wait:'pa_wait',hidden:'pa_hidden',line:'mn_line',doc:'mn_doc2',ev:'mn_ev',loop:'mn_loop',cases:'pa_case_manager_core',last:'pa_last_task'};
const CASES={gp:['GP / Primary Care',/\bgp\b|doctor|practice|banbridge group|dr cullen|dr dillon|dr mcniff/i],rheum:['Rheumatology / hEDS-HSD',/rheumatology|rheumatologist|heds|hsd|hypermobility|joint|beighton/i],oral:['Oral Medicine / Dentistry',/dentist|dental|oral|burning mouth|tmj|jaw|gum|tooth|catherine|claire/i],social:['Social Care / Mary-Sue / Cherrytrees',/social care|mary-sue|mary sue|cherrytrees|physical disability team|care plan|assessment/i],pip:['PIP',/\bpip\b|personal independence payment|assessment|mandatory reconsideration|tribunal/i],uc:['Universal Credit / LCWRA / Appointee',/universal credit|\buc\b|lcwra|appointee|work coach|mollie/i],bank:['Banking / AIB / LCS',/aib|bank|payment|direct debit|standing order|chargeback|refund|lcs|1st locate|debt|fraud|scam/i],housing:['Housing / Repairs / Lotus',/housing|repair|lotus|clixifix|leak|water ingress|alarm|boiler|plumber|electric|lights/i],utilities:['Utilities / Priority Services',/power ni|nie networks|electricity|gas|utility|priority service|care register/i],access:['Accessibility / Reasonable Adjustments',/reasonable adjustment|accessibility|easy read|written summary|no phone|telephone|aac|communication|autism|autistic|visual aids|body chart/i]};
function arr(k){try{return JSON.parse(localStorage[k]||'[]')}catch(e){return[]}}
function add(k,o){let a=arr(k);o.date=new Date().toLocaleString('en-GB');a.unshift(o);localStorage[k]=JSON.stringify(a)}
function readObj(k,d={}){try{return JSON.parse(localStorage[k]||JSON.stringify(d))}catch(e){return d}}
function writeObj(k,o){localStorage[k]=JSON.stringify(o)}
function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function btn(label,fn,cls=''){let b=document.createElement('button');b.className=cls;b.innerHTML=label;b.addEventListener('click',fn);return b}
function card(title,body=''){let d=document.createElement('div');d.className='card';if(title)d.innerHTML='<b>'+esc(title)+'</b>';if(body){let p=document.createElement('div');p.className='out';p.textContent=body;d.appendChild(p)}return d}
function grid(items){let g=document.createElement('div');g.className='grid';items.forEach(i=>g.appendChild(btn(i[0],i[1],i[2]||'')));return g}
function copy(t){navigator.clipboard?.writeText(t).catch(()=>{})}
function setScreen(title,body,items=[]){app.innerHTML='';app.appendChild(card(title,body));if(items.length)app.appendChild(grid(items));}
function showOut(t){let o=document.getElementById('out');if(!o){o=document.createElement('div');o.id='out';o.className='card out';app.appendChild(o)}o.textContent=t}
function intake(){app.innerHTML='';let intro=card('Case Manager Intake','Paste anything. PA links it to active cases, evidence, open loops, recovery and drafts before showing one next step.');intro.classList.add('soft');app.appendChild(intro);let box=document.createElement('textarea');box.id='txt';box.rows=8;box.placeholder='Paste email, letter, appointment text, screenshot text, message, form text, or file name.';app.appendChild(box);let file=document.createElement('input');file.type='file';file.accept='image/*,.pdf,.txt,.doc,.docx';file.addEventListener('change',()=>showOut('File selected. On iPhone, use Live Text to copy image words, paste them here, then process. If you upload the image directly to ChatGPT, I can read it there.'));app.appendChild(file);app.appendChild(grid([['🪄 Process Clipboard',processClipboard,'primary'],['✅ Process Intake',()=>processText(box.value),'primary'],['🧠 Case Manager',cases],['📋 Last Result',last]]));let out=document.createElement('div');out.id='out';out.className='card out';app.appendChild(out)}
async function processClipboard(){try{let t=await navigator.clipboard.readText();document.getElementById('txt').value=t;processText(t)}catch(e){showOut('Clipboard blocked. Copy text first, then try again.')}}
function processText(text){if(!text||!text.trim()){showOut('Nothing to process. Paste text first.');return}let ctx=analyse(text),tasks=createTasks(ctx),mum=mumSummary(ctx),reply=draft(ctx),result=renderResult(ctx,tasks,mum,reply);let payload={timestamp:new Date().toISOString(),domain:ctx.route,cases:ctx.caseNames,contact:ctx.contact,summary:ctx.bottom,priority:ctx.priority,deadline:ctx.deadline,tasks,mum_summary:mum,draft_reply:reply,result,original:text};writeObj(K.last,payload);logMira(payload);updateCases(ctx,tasks,text);tasks.forEach(t=>add(t.queue,{a:t.title,org:ctx.route,status:t.status,b:t.detail}));showResult(payload)}
function analyse(text){let low=text.toLowerCase(),route='General';if(/nhs|hscni|trust|gp|doctor|hospital|clinic|appointment|rheumatology|dentist|pharmacy|prescription|blood test|scan|referral/.test(low))route='Healthcare';else if(/pip|dwp|universal credit|\buc\b|lcwra|benefit|dfc|mandatory reconsideration|tribunal|assessment/.test(low))route='Benefits';else if(/bank|payment|direct debit|refund|chargeback|invoice|debt|standing order|aib|lcs|scam|fraud/.test(low))route='Finance';else if(/repair|housing|leak|alarm|electric|builder|lotus|plumber|clixifix|boiler|water ingress/.test(low))route='Housing';else if(/college|university|course|student|open university|study|assignment/.test(low))route='Education';else if(/autism|autistic|reasonable adjustment|sensory|aac|disability|accessibility|easy read/.test(low))route='Accessibility';let caseKeys=Object.keys(CASES).filter(k=>CASES[k][1].test(text));let caseNames=caseKeys.map(k=>CASES[k][0]);let deadline=dateFind(text)||'No clear date found';let appointment=/appointment|attend|clinic|hospital|dentist|rheumatology|gp|blood test|scan|review/i.test(text);let phone=/phone|call|telephone/i.test(text);let action=/reply|required|complete|return|confirm|book|attend|deadline|before|by |call|contact|provide|send|submit|form/i.test(text)||appointment;let risk=/urgent|final|overdue|missed|debt|fraud|scam|cancel|suspend|appointment|deadline|termination|failure to/i.test(text);let openLoop=/will contact|waiting|referral|follow up|respond|reply|investigation|review|arrange|book|confirm/i.test(text);let evidence=/nhs|hscni|trust|gp|hospital|pip|dwp|uc|universal credit|bank|aib|housing|repair|social care|assessment|autism|reasonable adjustment/i.test(text);let recovery=Number(localStorage.mn_recovery_until||0)>Date.now();let contact=contactFor(route,low);let priority=risk?'RED - check, do not ignore':(action?'AMBER - one review step':'GREEN - file / wait');let bottom='This belongs to '+(caseNames.length?caseNames.join(' + '):route)+'. '+(appointment?'Appointment-related. ':action?'May need one action. ':'No immediate action clear. ')+(phone?'Phone/call mentioned: use written-only wording. ':'')+(recovery?'Recovery mode active: reduce demands.':'');return{route,caseKeys,caseNames,deadline,appointment,phone,action,risk,openLoop,evidence,recovery,contact,priority,bottom,text}}
function dateFind(t){let ps=[/\b\d{1,2}[\/\-. ]\d{1,2}[\/\-. ]\d{2,4}\b/,/\b\d{1,2}\s+(January|February|March|April|May|June|July|August|September|October|November|December)\s+\d{4}\b/i,/\b(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday)\s+\d{1,2}\s+(January|February|March|April|May|June|July|August|September|October|November|December)\b/i];for(let p of ps){let m=t.match(p);if(m)return m[0]}return''}
function contactFor(route,low){if(route==='Finance')return low.includes('aib')?'AIB / bank support':'Finance contact';if(route==='Healthcare')return low.includes('trust')||low.includes('hscni')?'Southern Trust / healthcare team':low.includes('gp')?'GP / healthcare team':'Healthcare contact';if(route==='Benefits')return low.includes('universal credit')||/\buc\b/.test(low)?'Universal Credit':'Benefits contact';if(route==='Housing')return low.includes('lotus')?'Lotus / housing repair contact':'Housing / repair contact';return route}
function createTasks(c){let ts=[];if(c.evidence)ts.push({title:'Evidence linked to case',queue:K.wait,status:'Done / saved',detail:'Saved to Mira and linked to case.'});if(c.appointment){ts.push({title:'Prepare appointment pack',queue:K.ready,status:'Ready / one step',detail:'Mellow AAC, questions, written/no-phone, Easy Read, written summary, body chart/visual aids.'});ts.push({title:'48h recovery block',queue:K.hidden,status:'Recovery shield',detail:'Hide banking, benefits forms, difficult emails and complex admin after appointment.'});ts.push({title:'Post-appointment follow-up',queue:K.wait,status:'Waiting / after appointment',detail:'Check summary, referrals, results, owner and timescale.'})}else if(c.action){ts.push({title:'Review '+c.route+' item',queue:K.ready,status:'Ready / one small step',detail:'Use bottom line and draft. Do not re-read everything.'})}else ts.push({title:'Filed to Case Manager',queue:K.wait,status:'Waiting / no action now',detail:'No clear action. Kept as case evidence.'});if(c.deadline!=='No clear date found')ts.push({title:'Date found: '+c.deadline,queue:K.ready,status:'Calendar/check needed',detail:'Confirm if appointment, deadline or information date.'});if(c.phone)ts.push({title:'Block phone demand',queue:K.ready,status:'Accessibility wording needed',detail:'Use written-only / no phone script.'});if(c.openLoop)ts.push({title:'Open loop watch',queue:K.wait,status:'Waiting / chase if overdue',detail:'Someone may need to reply, arrange, confirm or follow up.'});return ts}
function nextStep(c){if(c.appointment)return'Confirm date/time/location, prepare Mellow AAC, and protect 48h recovery afterwards.';if(c.phone)return'Do not phone. Use written-only reply or ask for written clarification.';if(c.risk)return'Do not ignore. Review with support or use draft asking for written confirmation.';if(c.action)return'Use prepared reply or keep as one ready task. Stop after one step.';return'No action now. Save to Case Manager and wait.'}
function mumSummary(c){return'妈妈，简单说：\n\n这条信息属于：'+(c.caseNames.join(' / ')||c.route)+'。\n\n重点：'+c.bottom+'\n\n日期/截止时间：'+c.deadline+'\n\n下一步：'+nextStep(c)+'\n\nPA 已经保存到 Case Manager，并自动生成任务。请不要让我打电话；重要事情尽量用文字处理。'}
function draft(c){let noPhone='Please communicate with me in writing. Telephone contact is not accessible or safe for me.';let base='Please confirm what this means, what action is required, who is responsible, and the deadline or timescale.';if(c.route==='Finance')return'Dear Team,\n\nPlease confirm the issue, amount, date, responsible team and next step in writing. '+noPhone+'\n\nKind regards,\nMenglu Liu';if(c.route==='Healthcare')return'Dear Team,\n\nThank you for your message. Because of my disability-related communication, processing and fatigue difficulties, '+base+' Please also provide an Easy Read or simple written summary where possible. '+noPhone+'\n\nKind regards,\nMenglu Liu';if(c.route==='Benefits')return'Dear Team,\n\nThank you for your message. Because of my disability-related communication, processing and executive functioning difficulties, '+base+' Please confirm any reasonable adjustments available. '+noPhone+'\n\nKind regards,\nMenglu Liu';return'Dear Team,\n\nThank you for your message. Because of my disability-related communication and processing difficulties, '+base+'\n\nKind regards,\nMenglu Liu'}
function renderResult(c,tasks,mum,reply){return'CASE MANAGER INTAKE\n\nACTIVE CASE\n'+(c.caseNames.join('\n')||c.route)+'\n\nBOTTOM LINE\n'+c.bottom+'\n\nIMPORTANCE\n'+c.priority+'\n\nDATE / DEADLINE FOUND\n'+c.deadline+'\n\nTODAY?\n'+(c.risk?'YES - check calmly or ask support.':c.action?'POSSIBLY - one review step only.':'NO clear action today.')+'\n\nONE SAFEST NEXT STEP\n'+nextStep(c)+'\n\nTASKS CREATED\n'+tasks.map(t=>'✓ '+t.title+' — '+t.status).join('\n')+'\n\nMUM CHINESE\n'+mum+'\n\nDRAFT REPLY IF NEEDED\n'+reply}
function updateCases(c,tasks,text){let cm=readObj(K.cases,{});let keys=c.caseKeys.length?c.caseKeys:['general'];keys.forEach(k=>{let def=CASES[k]||[c.route];let item=cm[k]||{name:def[0],status:'Active',evidence:[],deadlines:[],risks:[]};item.updated=new Date().toISOString();item.phase=c.appointment?'Appointment / preparation':c.openLoop?'Waiting / open loop':c.action?'Action review':'Evidence / waiting';item.waiting_for=c.openLoop?c.contact:(c.action?'Menglu review only if needed':'No action now');item.next_action=nextStep(c);if(c.deadline!=='No clear date found')item.deadlines.unshift(c.deadline);if(c.risk)item.risks.unshift(c.priority);item.evidence.unshift({date:new Date().toISOString(),summary:c.bottom,text:text.slice(0,800)});item.tasks=tasks.map(t=>t.title+' — '+t.status);cm[k]=item});writeObj(K.cases,cm)}
function logMira(p){let a=arr('mira_next_timeline');a.unshift(p);localStorage.mira_next_timeline=JSON.stringify(a);localStorage.mira_next_active_session=JSON.stringify(p)}
function showResult(p){app.innerHTML='';app.appendChild(card('Case Manager Result',p.result));app.appendChild(grid([['👩 Copy Mum Chinese',()=>{copy(p.mum_summary);showOut('Copied Mum Chinese.')} ,'primary'],['📋 Copy reply',()=>{copy(p.draft_reply);showOut('Draft copied. Review before sending.')}],['📅 Calendar draft',calendarDraft],['🧠 Cases',cases],['🧾 Tasks',tasks],['↩ Intake',intake]]));let out=document.createElement('div');out.id='out';out.className='card out';app.appendChild(out)}
function cases(){let cm=readObj(K.cases,{});let rows=Object.values(cm).sort((a,b)=>(b.updated||'').localeCompare(a.updated||''));app.innerHTML='';app.appendChild(card('Case Manager Core','Every input is linked to active cases. This prevents isolated emails and repeated explaining.'));if(!rows.length)app.appendChild(card('No cases yet','Use Intake first.'));rows.forEach(c=>app.appendChild(card(c.name,'Phase: '+(c.phase||'')+'\nWaiting for: '+(c.waiting_for||'')+'\nNext: '+(c.next_action||'')+'\nEvidence items: '+(c.evidence?.length||0)+'\nUpdated: '+(c.updated||''))));app.appendChild(grid([['🪄 New intake',intake,'primary'],['📋 Last result',last],['🚦 Pacing',pace]]))}
function last(){let p=readObj(K.last,null);if(!p){intake();return}showResult(p)}
function calendarDraft(){let p=readObj(K.last,{});let t='Calendar draft\n\nTitle: '+(p.domain||'Item')+' - '+(p.contact||'')+'\nDate found: '+(p.deadline||'Not found')+'\nNotes:\n- Bring/use Mellow AAC if needed.\n- Request written summary / Easy Read.\n- No phone; written contact preferred.\n- Protect 48h recovery afterwards.\n\nIf date/time is definite, ask ChatGPT to add this to Google Calendar.';copy(t);showOut(t)}
function tasks(){let p=readObj(K.last,{});showOut('TASKS CREATED\n\n'+((p.tasks||[]).map(a=>'• '+a.title+'\n  '+a.status+'\n  '+a.detail).join('\n\n')||'No tasks found.'))}
function pace(){let r=arr(K.ready),w=arr(K.wait),h=arr(K.hidden);setScreen('Demand Pacing','Only one demand is shown.\n\nReady: '+r.length+'\nWaiting: '+w.length+'\nHidden: '+h.length+'\n\nOne visible item:\n'+(r[0]?.a||'No ready demand.'),[['🪄 Intake',intake,'primary'],['🧠 Cases',cases],['Start recovery',()=>{localStorage.mn_recovery_until=Date.now()+48*3600000;setScreen('Recovery started','48h recovery shield active. Avoid banking, forms and difficult emails.')} ,'danger']])}
function apps(){setScreen('Connected apps','PA shields. Mira organises. Mellow speaks.',[['🐻 Mellow AAC',()=>location.href='../','primary'],['✨ Mira OS',()=>location.href='../mira-next/'],['🪄 Intake',intake,'primary'],['🧠 Cases',cases],['🚦 Pacing',pace]])}
document.getElementById('navIntake').addEventListener('click',intake);document.getElementById('navCases').addEventListener('click',cases);document.getElementById('navLast').addEventListener('click',last);document.getElementById('navPace').addEventListener('click',pace);document.getElementById('navApps').addEventListener('click',apps);intake();
</script></body></html>
