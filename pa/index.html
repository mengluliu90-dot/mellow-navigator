<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#315f9f"><link rel="manifest" href="manifest.json"><link rel="icon" href="pa-icon.svg"><link rel="apple-touch-icon" href="pa-icon.svg"><title>Menglu OS</title><style>:root{--bg:#f8fbff;--card:#fff;--line:#d9d8ee;--ink:#111;--blue:#315f9f;--red:#9b111e;--green:#166534;--amber:#92400e;--soft:#eef7ff;--pink:#fff3f8}*{box-sizing:border-box}body{font-family:Arial,sans-serif;margin:0;background:linear-gradient(180deg,var(--bg),#fff8fc);color:var(--ink);padding:12px 12px 92px;max-width:760px}h1{font-size:24px;margin:4px 0}.top{display:flex;gap:10px;align-items:center}.logo{width:52px;height:52px;border-radius:16px}.tag{font-size:13px;border:1px solid var(--line);border-radius:999px;padding:5px 8px;background:#fff}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;box-shadow:0 2px 10px rgba(49,95,159,.06)}.soft{background:linear-gradient(135deg,var(--soft),var(--pink))}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}button{width:100%;font-size:16px;line-height:1.22;padding:12px;border:1px solid #bbb;border-radius:15px;background:#fff;text-align:left;min-height:58px}button.primary{border:2px solid var(--blue);color:var(--blue);font-weight:700;background:#f4f9ff}button.danger{border:2px solid var(--red);color:var(--red);font-weight:700;background:#fff7f7}button.green{border:2px solid var(--green);color:var(--green);font-weight:700;background:#f4fff7}textarea,input{width:100%;font-size:17px;padding:12px;margin:6px 0 10px;border:1px solid #aaa;border-radius:12px;background:#fff}.out{white-space:pre-wrap;font-size:17px;line-height:1.45}.small{font-size:14px;color:#555;line-height:1.35}.bar{height:11px;border-radius:999px;background:#e5e7eb;overflow:hidden;margin:6px 0}.fill{height:100%;background:#315f9f}.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:4px 8px;margin:3px;background:#fff}.red{color:var(--red);font-weight:700}.amber{color:var(--amber);font-weight:700}.bottom{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;background:rgba(255,255,255,.96);border-top:1px solid var(--line);padding:6px;max-width:760px;margin:auto}.bottom button{font-size:12px;text-align:center;padding:8px 2px;min-height:44px;border-radius:12px}@media(max-width:330px){.grid{grid-template-columns:1fr}}</style></head><body><div class="top"><img src="pa-icon.svg" class="logo" alt=""><div><h1>Menglu OS</h1><div class="tag">v2 · Task Intelligence</div></div></div><main id="app"><div class="card soft">Loading...</div></main><nav class="bottom"><button id="bDash">🏠<br>Dash</button><button id="bIntake">🪄<br>Intake</button><button id="bTasks">✅<br>Tasks</button><button id="bCases">🧠<br>Cases</button><button id="bApps">🔗<br>Apps</button></nav><script>
const app=document.getElementById('app');
const STORE={cases:'uos_cases',timeline:'uos_timeline',last:'uos_last',profile:'uos_profile',state:'uos_state',learn:'uos_learning',tasks:'uos_tasks',contacts:'uos_contacts',drafts:'uos_drafts'};
const CASES={rheum:['Rheumatology / hEDS',/rheumatology|heds|hsd|hypermobility|joint|beighton|pain|pots/i],gp:['GP',/\bgp\b|doctor|practice|banbridge group|dr cullen|dr dillon|dr mcniff/i],social:['Social Care',/social care|care plan|assessment|support worker/i],mary:['Mary-Sue',/mary-sue|mary sue|ohare|o’hare/i],cherry:['Cherrytrees',/cherrytrees|physical disability team/i],pip:['PIP',/\bpip\b|personal independence payment|mandatory reconsideration|tribunal|assessment/i],uc:['Universal Credit',/universal credit|\buc\b|lcwra|appointee|work coach|mollie/i],bank:['Banking',/aib|bank|payment|direct debit|standing order|chargeback|refund|lcs|1st locate|debt|fraud|scam/i],housing:['Housing',/housing|repair|lotus|clixifix|leak|water ingress|alarm|boiler|plumber|electric|lights/i],dentistry:['Dentistry',/dentist|dental|tooth|gum|catherine|claire/i],thyroid:['Thyroid',/thyroid|nodule|ultrasound|endocrine/i],oral:['Oral Medicine',/oral medicine|burning mouth|tmj|jaw|mouth/i]};
const PROFILE={written:'Phone calls are an accessibility barrier. Use written communication.',easy:'Request Easy Read or simple written summary.',recovery:'Appointments and outings require about 48 hours recovery.',outing:'Out-of-home activity should be limited to about 2 days per week.',masking:'Masking may make difficulties appear less severe. Supported functioning is not independent functioning.',visual:'Ask for body chart or visual aids where helpful.',principle:'Every update must reduce work, not increase features.'};
function jget(k,d){try{return JSON.parse(localStorage[k]||JSON.stringify(d))}catch(e){return d}}
function jset(k,v){localStorage[k]=JSON.stringify(v)}
function esc(s){return String(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function el(tag,cls,txt){let x=document.createElement(tag);if(cls)x.className=cls;if(txt!==undefined)x.textContent=txt;return x}
function card(t,b){let c=el('div','card');if(t){let h=document.createElement('b');h.textContent=t;c.appendChild(h)}if(b){let d=el('div','out',b);d.textContent=b;c.appendChild(d)}return c}
function btn(label,fn,cls=''){let b=document.createElement('button');b.className=cls;b.innerHTML=label;b.addEventListener('click',fn);return b}
function grid(items){let g=el('div','grid');items.forEach(i=>g.appendChild(btn(i[0],i[1],i[2]||'')));return g}
function copy(t){navigator.clipboard?.writeText(t).catch(()=>{})}
function out(t){let o=document.getElementById('out');if(!o){o=el('div','card out');o.id='out';app.appendChild(o)}o.textContent=t}
function progress(n){let w=Math.max(0,Math.min(100,n||0));return '<div class="bar"><div class="fill" style="width:'+w+'%"></div></div>'}
function screen(t,b,items=[]){app.innerHTML='';let c=card(t,b);c.classList.add('soft');app.appendChild(c);if(items.length)app.appendChild(grid(items))}
function dashboard(){let tasks=jget(STORE.tasks,[]),tl=jget(STORE.timeline,[]),cm=jget(STORE.cases,{}),s=jget(STORE.state,{mode:'HOME',recovery_until:0}),ready=tasks.filter(t=>t.status==='Needs Review'||t.priority==='RED'),waiting=tasks.filter(t=>t.status==='Waiting'),hidden=tasks.filter(t=>t.status==='Hidden');let rec=Number(s.recovery_until||0)>Date.now();let load=calcLoad();app.innerHTML='';app.appendChild(card('Life Dashboard','Already handled\n✓ Cases updated: '+Object.keys(cm).length+'\n✓ Timeline items: '+tl.length+'\n✓ Tasks generated: '+tasks.length+'\n\nNeed Menglu\n□ '+(ready[0]?.title||'Nothing urgent')+'\n\nState: '+(rec?'RECOVERY':'HOME')+'\nEstimated visible effort: '+(ready.length?'2 minutes':'0 minutes')));let dash=el('div','card');dash.innerHTML='<b>Demand budget</b><div class="small">Health / admin load</div>'+progress(load)+'<div class="small">Ready '+ready.length+' · Waiting '+waiting.length+' · Hidden '+hidden.length+'</div>';app.appendChild(dash);app.appendChild(grid([['🪄 New Intake',intake,'primary'],['✅ Tasks',tasksView,'primary'],['🧠 Cases',cases],['🧾 Timeline',timeline],['Start Recovery',()=>{s.mode='RECOVERY';s.recovery_until=Date.now()+48*3600000;jset(STORE.state,s);dashboard()},'danger']]));}
function intake(){app.innerHTML='';app.appendChild(card('Unified Intake','Paste anything. Menglu OS will process it through task intelligence, case manager, evidence, timeline, recovery and accessibility before showing one next step.'));let ta=document.createElement('textarea');ta.id='txt';ta.rows=8;ta.placeholder='Paste email, letter, appointment, screenshot text, message, or file text here.';app.appendChild(ta);let f=document.createElement('input');f.type='file';f.accept='image/*,.pdf,.txt,.doc,.docx';f.addEventListener('change',()=>out('File selected. On iPhone, use Live Text to copy image text into the box, or upload the image directly to ChatGPT for image reading.'));app.appendChild(f);app.appendChild(grid([['🪄 Process Clipboard',async()=>{try{let t=await navigator.clipboard.readText();ta.value=t;runPipeline(t)}catch(e){out('Clipboard blocked. Copy text first, then try again.')}},'primary'],['✅ Process Intake',()=>runPipeline(ta.value),'primary'],['🏠 Dashboard',dashboard],['📋 Last Result',last]]));let o=el('div','card out');o.id='out';app.appendChild(o)}
function runPipeline(text){if(!text||!text.trim()){out('Nothing to process. Paste text first.');return}let o=intakeEngine(text);o=relationshipEngine(o);o=evidenceEngine(o);if(o.duplicate){let msg='ACTION LOGGED: Already tracked. No new action.';saveLast({format:'A',output:msg});return showResult(msg,null)}o=timelineEngine(o);o=contradictionEngine(o);o=confidenceEngine(o);o=stateEngine(o);o=learningEngine(o);o=taskIntelligence(o);o=executiveFunctionEngine(o);o=accessibilityValidator(o);commit(o);showResult(o.output,o)}
function intakeEngine(text){let low=text.toLowerCase(),type='Other';if(/from:|subject:|dear|regards|unsubscribe/i.test(text))type='Email/Letter';if(/appointment|clinic|attend|calendar|date|time/i.test(text))type='Appointment/Calendar';if(/pdf|scan|report|result|blood test|ultrasound/i.test(text))type='Medical Report/File';if(/bank|payment|statement|direct debit|refund/i.test(text))type='Bank Statement/Finance';return{text,low,type,ts:new Date().toISOString()}}
function relationshipEngine(o){let keys=Object.keys(CASES).filter(k=>CASES[k][1].test(o.text));if(!keys.length)keys=['general'];o.caseKeys=keys;o.caseNames=keys.map(k=>CASES[k]?.[0]||'General');return o}
function evidenceEngine(o){let tl=jget(STORE.timeline,[]);let sig=(o.text||'').slice(0,180).toLowerCase().replace(/\s+/g,' ');o.signature=sig;o.duplicate=tl.some(x=>x.signature===sig);o.evidenceScore=evidenceScore(o);return o}
function evidenceScore(o){let score=1;if(/nhs|hscni|trust|gp|hospital|assessment|report|decision|award|referral/i.test(o.text))score+=2;if(/communication|written|phone|reasonable adjustment|easy read|support|fatigue|pots|autism|pain/i.test(o.text))score+=2;if(/deadline|urgent|final|risk|safeguard|debt|fraud|repair|leak/i.test(o.text))score+=1;return Math.min(5,score)}
function timelineEngine(o){o.deadline=findDate(o.text)||'No clear date found';o.appointment=/appointment|clinic|attend|hospital|gp|dentist|rheumatology|blood test|scan|review/i.test(o.text);o.phone=/phone|call|telephone/i.test(o.text);o.action=/reply|required|complete|return|confirm|book|attend|deadline|before|by |contact|provide|send|submit|form/i.test(o.text)||o.appointment;o.risk=/urgent|final|overdue|missed|debt|fraud|scam|cancel|suspend|deadline|termination|failure to/i.test(o.text);o.openLoop=/will contact|waiting|referral|follow up|respond|reply|investigation|review|arrange|book|confirm|promise/i.test(o.text);return o}
function contradictionEngine(o){o.breaches=[];if(o.phone)o.breaches.push('Phone/call demand conflicts with written-only communication need.');if(o.appointment&&!/written|summary|easy read|adjustment/i.test(o.text))o.breaches.push('Appointment may not include reasonable adjustments yet.');if(/will contact|referral|arrange/i.test(o.text))o.breaches.push('Open loop created: future chase may be needed.');return o}
function confidenceEngine(o){let score=70;if(o.caseKeys[0]!=='general')score+=10;if(o.deadline!=='No clear date found')score+=8;if(o.action)score+=5;if(o.risk)score+=5;if(o.text.length>80)score+=5;o.confidence=Math.min(99,score);return o}
function stateEngine(o){let s=jget(STORE.state,{mode:'HOME',recovery_until:0,outings:0});if(o.appointment){s.mode='PREPARING';s.recovery_until=Date.now()+48*3600000}if(Number(s.recovery_until||0)>Date.now())s.mode='RECOVERY';o.state=s;jset(STORE.state,s);return o}
function learningEngine(o){let l=jget(STORE.learn,{repeats:{},rules:['Always use written communication','Always request Easy Read where useful','Always protect recovery after appointments']});let key=o.caseKeys[0]||'general';l.repeats[key]=(l.repeats[key]||0)+1;o.learningLevel=Math.min(95,50+(l.repeats[key]*15));jset(STORE.learn,l);return o}
function taskIntelligence(o){o.tasks=makeTasks(o).map((t,i)=>({...t,id:'task_'+Date.now()+'_'+i,caseNames:o.caseNames,created:new Date().toISOString(),progress:t.progress||70,evidenceScore:o.evidenceScore,aiDone:t.aiDone||['Read input','Linked case','Updated timeline','Prepared next step'],need:t.need||'Review only if shown'}));return o}
function executiveFunctionEngine(o){let load=0;if(o.appointment)load+=50;if(o.action)load+=20;if(o.risk)load+=25;if(o.phone)load+=15;if(o.state.mode==='RECOVERY')load+=30;o.load=Math.min(100,load);o.delayNonUrgent=o.load>=70&&!o.risk;return o}
function accessibilityValidator(o){let draft=makeDraft(o);let alert=o.risk?'Risk/deadline detected.':o.phone?'Phone barrier detected.':o.action?'One review step may be needed.':'';let needsReview=o.confidence<95&&(o.action||o.risk||o.phone);if(o.delayNonUrgent&&!o.risk){needsReview=false;alert='Demand delayed because recovery/load is high.'}o.draft=draft;o.next=nextStep(o);o.mum=makeMum(o);if(needsReview)o.output='REVIEW REQUIRED: '+alert+'\n\nWhy this?\n'+why(o)+'\n\nSafest prepared draft:\n\n'+draft+'\n\nReview? Yes / No';else o.output='ACTION LOGGED: '+(o.caseNames.join(' / ')||'General')+' updated; '+o.next;return o}
function makeTasks(o){let t=[];t.push({title:'Link evidence to '+(o.caseNames.join(' / ')||'General'),status:'Done',priority:'LOW',detail:'Evidence score '+o.evidenceScore+'/5. Saved to timeline.',progress:100,need:'None'});if(o.appointment){t.push({title:'Prepare appointment pack',status:'Needs Review',priority:'AMBER',detail:'Mellow AAC, questions, written/no-phone, Easy Read, written summary, body chart/visual aids.',progress:85,need:'Review pack'});t.push({title:'48h recovery block',status:'Hidden',priority:'AMBER',detail:'Hide banking, benefits forms, difficult emails and complex admin after appointment.',progress:100,need:'None'});t.push({title:'Post-appointment follow-up',status:'Waiting',priority:'LOW',detail:'Check summary, referrals, results, owner and timescale.',progress:40,need:'Wait'})}else if(o.action){t.push({title:'Prepare one draft reply',status:'Needs Review',priority:o.risk?'RED':'AMBER',detail:'Draft prepared. Do not re-read full text.',progress:90,need:'Review draft'})}else t.push({title:'Filed to Case Manager',status:'Waiting',priority:'LOW',detail:'No clear action. Kept as case evidence.',progress:100,need:'None'});if(o.deadline!=='No clear date found')t.push({title:'Date found: '+o.deadline,status:'Needs Review',priority:o.risk?'RED':'AMBER',detail:'Confirm if appointment, deadline or information date.',progress:60,need:'Confirm date'});if(o.phone)t.push({title:'Block phone demand',status:'Needs Review',priority:'AMBER',detail:'Use written-only / no phone script.',progress:95,need:'Approve wording'});if(o.openLoop)t.push({title:'Open loop watch',status:'Waiting',priority:'LOW',detail:'Someone may need to reply, arrange, confirm or follow up.',progress:50,need:'Wait'});return t}
function commit(o){let tl=jget(STORE.timeline,[]);tl.unshift({date:new Date().toISOString(),type:o.type,cases:o.caseNames,summary:o.output,signature:o.signature,deadline:o.deadline,tasks:o.tasks,load:o.load,evidenceScore:o.evidenceScore});jset(STORE.timeline,tl);let all=jget(STORE.tasks,[]);o.tasks.forEach(t=>all.unshift(t));jset(STORE.tasks,all.slice(0,200));let drafts=jget(STORE.drafts,[]);if(o.draft)drafts.unshift({date:new Date().toISOString(),cases:o.caseNames,draft:o.draft,status:'Prepared / not sent'});jset(STORE.drafts,drafts.slice(0,100));let cm=jget(STORE.cases,{});o.caseKeys.forEach(k=>{let name=CASES[k]?.[0]||'General';let c=cm[k]||{name,status:'Active',evidence:[],tasks:[]};c.updated=new Date().toISOString();c.phase=o.appointment?'Appointment / preparation':o.openLoop?'Waiting / open loop':o.action?'Action review':'Evidence / waiting';c.waiting_for=o.openLoop?'External service / future response':(o.action?'Menglu review only if needed':'No action now');c.deadline=o.deadline;c.next=o.next;c.risks=o.breaches;c.evidence.unshift({date:new Date().toISOString(),type:o.type,score:o.evidenceScore,summary:o.output});c.tasks=o.tasks;c.confidence=o.confidence;c.load=o.load;cm[k]=c});jset(STORE.cases,cm);saveLast(o)}
function findDate(t){let ps=[/\b\d{1,2}[\/\-. ]\d{1,2}[\/\-. ]\d{2,4}\b/,/\b\d{1,2}\s+(January|February|March|April|May|June|July|August|September|October|November|December)\s+\d{4}\b/i,/\b(Monday|Tuesday|Wednesday|Thursday|Friday|Saturday|Sunday)\s+\d{1,2}\s+(January|February|March|April|May|June|July|August|September|October|November|December)\b/i];for(let p of ps){let m=t.match(p);if(m)return m[0]}return''}
function why(o){if(o.phone)return'Phone communication conflicts with your written-communication accessibility rule.';if(o.appointment)return'Appointments usually require preparation and recovery protection.';if(o.risk)return'There may be a deadline, risk, or consequence if ignored.';return'This can be handled with one prepared step.'}
function nextStep(o){if(o.appointment)return'Prepare appointment pack and protect 48-hour recovery.';if(o.phone)return'Do not phone. Use written-only draft.';if(o.risk)return'Review safest draft or ask support. Do not ignore.';if(o.action)return'Use prepared draft or keep as one ready task.';return'No action now. Logged to timeline.'}
function makeDraft(o){let noPhone='Please communicate with me in writing. Telephone contact is not accessible or safe for me.';let base='Please confirm what this means, what action is required, who is responsible, and the deadline or timescale.';if(o.appointment)return'Dear Team,\n\nThank you for the appointment information. Because of my disability-related communication, processing and fatigue difficulties, please provide the appointment details and next steps in writing. Please also allow extra processing time, one question at a time, and an Easy Read or simple written summary where possible. '+noPhone+'\n\nKind regards,\nMenglu Liu';if(o.phone||o.action||o.risk)return'Dear Team,\n\nThank you for your message. Because of my disability-related communication and processing difficulties, '+base+' '+noPhone+'\n\nKind regards,\nMenglu Liu';return''}
function makeMum(o){return'妈妈，简单说：\n\n这条信息属于：'+(o.caseNames.join(' / ')||'General')+'。\n\n重点：'+nextStep(o)+'\n\n日期/截止时间：'+o.deadline+'\n\nPA 已经保存到时间线并生成任务。如果需要回复，会准备英文草稿。请不要让我打电话。'}
function saveLast(o){jset(STORE.last,o)}
function showResult(txt,o){app.innerHTML='';app.appendChild(card('Binary Output',txt));app.appendChild(grid([['👩 Copy Mum',()=>{copy((o&&o.mum)||'');out('Copied Chinese summary for Mum.')} ,'primary'],['📋 Copy Draft',()=>{copy((o&&o.draft)||'');out('Copied draft. Review before sending.')}],['✅ Tasks',tasksView,'primary'],['🧠 Cases',cases],['↩ Intake',intake]]));let d=el('div','card out');d.id='out';if(o)d.textContent='Confidence: '+o.confidence+'%\nState: '+o.state.mode+'\nLoad: '+o.load+'%\nEvidence score: '+o.evidenceScore+'/5\nProgressive automation: '+o.learningLevel+'%\n\nTasks:\n- '+o.tasks.map(t=>t.title+' ('+t.status+')').join('\n- ');app.appendChild(d)}
function tasksView(){let all=jget(STORE.tasks,[]);app.innerHTML='';app.appendChild(card('Task Intelligence','Tasks show what AI already completed and what, if anything, Menglu needs to review.'));if(!all.length)app.appendChild(card('No tasks yet','Use Intake first.'));all.slice(0,40).forEach(t=>{let c=el('div','card');c.innerHTML='<b>'+esc(t.title)+'</b><div class="small">'+esc(t.status)+' · '+esc(t.priority||'')+'</div>'+progress(t.progress||0)+'<div class="out">AI already completed:\n✓ '+esc((t.aiDone||[]).join('\n✓ '))+'\n\nNeed from Menglu:\n□ '+esc(t.need||'None')+'\n\n'+esc(t.detail||'')+'</div>';app.appendChild(c)});app.appendChild(grid([['🏠 Dashboard',dashboard,'primary'],['🪄 Intake',intake],['🧠 Cases',cases],['Clear completed',()=>{let keep=all.filter(t=>t.status!=='Done');jset(STORE.tasks,keep);tasksView()}]]))}
function cases(){let cm=jget(STORE.cases,{});let vals=Object.values(cm).sort((a,b)=>(b.updated||'').localeCompare(a.updated||''));app.innerHTML='';app.appendChild(card('Case Buckets','Each case now tracks phase, waiting, confidence, evidence score, recovery/load and tasks.'));if(!vals.length)app.appendChild(card('No cases yet','Use Intake first.'));vals.forEach(c=>app.appendChild(card(c.name,'Phase: '+(c.phase||'')+'\nWaiting for: '+(c.waiting_for||'')+'\nDeadline: '+(c.deadline||'')+'\nNext: '+(c.next||'')+'\nConfidence: '+(c.confidence||'')+'%\nLoad: '+(c.load||0)+'%\nEvidence items: '+(c.evidence?.length||0)+'\nUpdated: '+(c.updated||''))));app.appendChild(grid([['🏠 Dashboard',dashboard,'primary'],['🪄 Intake',intake],['✅ Tasks',tasksView],['🧾 Timeline',timeline]]))}
function timeline(){let tl=jget(STORE.timeline,[]);app.innerHTML='';app.appendChild(card('Life Event Timeline','Unified chronological ledger: event → evidence → task → draft → outcome.'));if(!tl.length)app.appendChild(card('No timeline yet','Use Intake first.'));tl.slice(0,30).forEach(x=>app.appendChild(card((x.date||'')+' · '+(x.type||''),(x.cases||[]).join(' / ')+'\n'+(x.summary||'')+'\nDeadline: '+(x.deadline||'')+'\nEvidence score: '+(x.evidenceScore||'')+'/5')));app.appendChild(grid([['🏠 Dashboard',dashboard,'primary'],['🧠 Cases',cases],['✅ Tasks',tasksView],['📋 Last',last]]))}
function stateView(){let s=jget(STORE.state,{mode:'HOME',recovery_until:0,outings:0});let rec=Number(s.recovery_until||0)>Date.now();screen('State / Recovery','Mode: '+(s.mode||'HOME')+'\nRecovery active: '+(rec?'YES':'NO')+'\n\nWhen recovery is active, optional Benefits, Banking and Housing work should be hidden unless urgent/statutory.',[['Start 48h Recovery',()=>{s.mode='RECOVERY';s.recovery_until=Date.now()+48*3600000;jset(STORE.state,s);stateView()},'danger'],['End Recovery',()=>{s.mode='HOME';s.recovery_until=0;jset(STORE.state,s);stateView()}],['🏠 Dashboard',dashboard,'primary'],['✅ Tasks',tasksView]])}
function last(){let x=jget(STORE.last,null);if(!x){intake();return}showResult(x.output||x.result||'Last item loaded.',x)}
function calcLoad(){let s=jget(STORE.state,{mode:'HOME',recovery_until:0}),tasks=jget(STORE.tasks,[]),load=tasks.filter(t=>t.status==='Needs Review').length*18+tasks.filter(t=>t.priority==='RED').length*25;if(Number(s.recovery_until||0)>Date.now())load+=35;return Math.min(100,load)}
function apps(){screen('Apps','Unified OS front end. Mellow speaks, Mira timeline stores, Menglu OS decides.',[['🐻 Mellow',()=>location.href='../','primary'],['✨ Mira',()=>location.href='../mira-next/'],['🏠 Dashboard',dashboard,'primary'],['🚦 State',stateView],['🧾 Timeline',timeline]])}
document.getElementById('bDash').addEventListener('click',dashboard);document.getElementById('bIntake').addEventListener('click',intake);document.getElementById('bTasks').addEventListener('click',tasksView);document.getElementById('bCases').addEventListener('click',cases);document.getElementById('bApps').addEventListener('click',apps);jset(STORE.profile,PROFILE);dashboard();
</script></body></html>
