<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#315f9f"><link rel="manifest" href="manifest.json"><link rel="icon" href="pa-icon.svg"><link rel="apple-touch-icon" href="pa-icon.svg"><title>Menglu PA</title><style>:root{--bg:#f8fbff;--card:#fff;--line:#d9d8ee;--ink:#111;--blue:#315f9f;--red:#a40000;--soft:#eef7ff;--pink:#fff3f8}*{box-sizing:border-box}body{font-family:Arial,sans-serif;margin:0;background:linear-gradient(180deg,var(--bg),#fff8fc);color:var(--ink);padding:12px 12px 86px;max-width:760px}h1{font-size:25px;margin:4px 0}.top{display:flex;gap:10px;align-items:center}.logo{width:52px;height:52px;border-radius:16px}.tag{font-size:13px;border:1px solid var(--line);border-radius:999px;padding:5px 8px;background:white}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin:10px 0;box-shadow:0 2px 10px rgba(49,95,159,.06)}.soft{background:linear-gradient(135deg,var(--soft),var(--pink))}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}button{width:100%;font-size:16px;line-height:1.22;padding:12px;border:1px solid #bbb;border-radius:15px;background:#fff;text-align:left;min-height:58px}button.primary{border:2px solid var(--blue);color:var(--blue);font-weight:700;background:#f4f9ff}button.danger{border:2px solid var(--red);color:var(--red);font-weight:700;background:#fff7f7}input,textarea{width:100%;font-size:17px;padding:12px;margin:6px 0 10px;border:1px solid #aaa;border-radius:12px;background:#fff}.out{white-space:pre-wrap;font-size:17px;line-height:1.45}.small{font-size:14px;color:#555;line-height:1.35}.bottom{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(5,1fr);gap:4px;background:rgba(255,255,255,.96);border-top:1px solid var(--line);padding:6px;max-width:760px;margin:auto}.bottom button{font-size:12px;text-align:center;padding:8px 2px;min-height:44px;border-radius:12px}@media(max-width:330px){.grid{grid-template-columns:1fr}}</style></head><body><div class="top"><img src="pa-icon.svg" class="logo" alt=""><div><h1>Menglu PA</h1><div class="tag">Quiet coordinator · stable version</div></div></div><main id="app"></main><nav class="bottom"><button onclick="home()">🏠<br>Home</button><button onclick="queue()">🧭<br>Queue</button><button onclick="receive()">📥<br>Received</button><button onclick="apptDone()">🏁<br>Done</button><button onclick="apps()">🔗<br>Apps</button></nav><script>
const app=document.getElementById('app');
const K={wait:'pa_wait',ready:'pa_ready',hidden:'pa_hidden',mum:'pa_mum',log:'pa_log'};
const MK={loop:'mn_loop',line:'mn_line',doc:'mn_doc2'};
function arr(k){try{return JSON.parse(localStorage[k]||'[]')}catch(e){return[]}}
function add(k,o){let a=arr(k);o.date=new Date().toLocaleString('en-GB');a.unshift(o);localStorage[k]=JSON.stringify(a)}
function v(id){return document.getElementById(id)?.value.trim()||''}
function set(id,t){let e=document.getElementById(id);if(e)e.textContent=t}
function grid(items){return '<div class="grid">'+items.map(i=>'<button class="'+(i[2]||'')+'" onclick="'+i[1]+'">'+i[0]+'</button>').join('')+'</div>'}
function shell(title,body){app.innerHTML='<div class="card soft"><b>'+title+'</b><p class="small">No daily check-in. PA only reduces work, sorts items, and opens the right tool.</p></div>'+body}
function kind(x){let s=(x||'').toLowerCase();if(s.includes('nhs')||s.includes('hospital')||s.includes('gp')||s.includes('appointment'))return 'healthcare';if(s.includes('pip')||s.includes('universal credit')||s.includes('dwp'))return 'benefits';if(s.includes('bank')||s.includes('payment'))return 'bank';if(s.includes('repair')||s.includes('housing'))return 'housing';return 'general'}
async function pasteTo(id){let e=document.getElementById(id);try{e.value=await navigator.clipboard.readText();e.focus()}catch(err){e.focus();alert('Clipboard blocked. Paste manually.')}}
function copy(t){navigator.clipboard.writeText(t).catch(()=>{})}
function home(){let rec=Number(localStorage.mn_recovery_until||0)>Date.now();shell('Low-demand home','<div class="card out">'+(rec?'Recovery mode is active. Difficult work should stay hidden.':'PA is working. Nothing extra is required.')+'\n\nReady: '+arr(K.ready).length+' | Waiting: '+arr(K.wait).length+' | Hidden: '+arr(K.hidden).length+'</div>'+grid([['🪄 I do not know what to do','magic()','primary'],['🧭 Life Queue','queue()','primary'],['📥 I received something','receive()'],['🏁 Appointment finished','apptDone()'],['🇨🇳 Tell Mum','mum()'],['🆘 Emergency','emergency()','danger']]))}
function queue(){let ready=arr(K.ready),wait=arr(K.wait),hidden=arr(K.hidden);shell('Life Queue','<div class="card out">This is not a to-do list. PA hides work unless it is ready or needed.</div>'+section('Recommended',ready.length?ready.map(item).join(''):'✅ Nothing urgent.')+section('Waiting for others',wait.length?wait.map(item).join(''):'No waiting items.')+section('Hidden / not now',hidden.length?hidden.map(item).join(''):'No hidden items.')+grid([['Magic recommendation','magic()','primary'],['Open Mira Next','location.href="../mira-next/"']]))}
function section(t,b){return '<div class="card"><b>'+t+'</b><div class="small">'+b+'</div></div>'}
function item(x){return '<p><b>'+(x.a||'Item')+'</b><br>'+(x.org||'')+' · '+(x.status||'')+'<br>'+(x.b||'')+'<br>'+(x.date||'')+'</p>'}
function magic(){let rec=Number(localStorage.mn_recovery_until||0)>Date.now(),ready=arr(K.ready),wait=arr(K.wait);let m;if(rec)m='Recommendation:\nRest / recovery mode. Do not start forms, banking, complex replies or new admin unless urgent.';else if(ready.length)m='Recommendation:\nReview one ready item only. Stop after this.\n\n'+(ready[0].a||'Ready item');else if(wait.length)m='Recommendation:\nNothing is ready for you. PA is waiting for other people.';else m='Recommendation:\nNothing needs doing from PA.';shell('Magic Button','<div class="card out">'+m+'</div>'+grid([['Open Queue','queue()'],['Open AAC','location.href="../"'],['Open Mira','location.href="../mira-next/"']]))}
function receive(){shell('I received something','<div class="card"><textarea id="rx" rows="8" placeholder="Paste email, letter, appointment text, or note here"></textarea>'+grid([['Paste','pasteTo("rx")'],['PA process it','processReceived()','primary']])+'</div><div id="out" class="card out"></div>')}
function processReceived(){let x=v('rx'),k=kind(x),hasAction=/deadline|reply|required|appointment|date|by |before/i.test(x);let reply='Dear Team,\n\nThank you for your message. Because of my disability-related communication and processing difficulties, please continue in writing and confirm the next step, who is responsible, and the timescale.\n\nKind regards,\nMenglu Liu';let m='PA processed this.\n\nType: '+k+'\nStatus: '+(hasAction?'Ready / review only':'Waiting / no action now')+'\n\nEasy Read headings:\n1. What this means\n2. Action needed\n3. Deadline\n4. Safest next step\n\nDraft reply:\n'+reply;set('out',m);add(hasAction?K.ready:K.wait,{a:'Received '+k+' item',org:k,status:hasAction?'Ready / review only':'Waiting / no action now',b:'PA processed. Review only if needed.'});add(MK.line,{a:'PA received '+k,b:x});add(MK.doc,{a:'PA processed '+k,b:m})}
function apptDone(){shell('Appointment Finished','<div class="card"><textarea id="an" rows="7" placeholder="Optional notes. Leave blank if too tired."></textarea>'+grid([['PA finish appointment','finishAppt()','primary'],['Just start recovery','startRecovery()','danger']])+'</div><div id="out" class="card out"></div>')}
function finishAppt(){let x=v('an')||'Appointment finished. Details can be added later.';localStorage.mn_recovery_until=Date.now()+48*3600000;add(MK.line,{a:'Appointment finished - recovery started',b:x});add(K.wait,{a:'Check appointment follow-up later',org:'Healthcare',status:'Waiting / recovery first',b:x});add(K.hidden,{a:'Complex admin hidden during recovery',org:'PA',status:'Hidden',b:'Avoid forms, banking, difficult replies.'});set('out','Appointment finished.\n\nPA started 48h recovery, added timeline, and created a quiet follow-up.\n\n'+mumText(x))}
function startRecovery(){localStorage.mn_recovery_until=Date.now()+48*3600000;set('out','48h recovery started in Mira. Avoid phone calls, forms, banking and complex replies.')}
function mumText(x){return '妈妈，今天的事情简单说：\n\n'+x+'\n\n接下来：请先让我休息。如果有信、电话、预约或需要回复，请之后再慢慢帮我看。\n\n我现在可能会脑雾、累、说不清楚，不是不想说。之后1-2天可能会更累。'}
function mum(){shell('Tell Mum in Mandarin','<div class="card"><textarea id="mumIn" rows="7" placeholder="Paste notes. PA will make simple Mandarin."></textarea>'+grid([['Paste notes','pasteTo("mumIn")'],['Generate + copy','makeMum()','primary']])+'</div><div id="out" class="card out"></div>')}
function makeMum(){let m=mumText(v('mumIn')||'今天有事情处理，我现在需要休息。');set('out',m);copy(m);add(K.mum,{text:m})}
function apps(){shell('Connected apps','<div class="card small">PA coordinates. It does not duplicate Mira.</div>'+grid([['🗣 Open AAC','location.href="../"','primary'],['✨ Open Mira Next','location.href="../mira-next/"','primary'],['📥 Received item','receive()'],['🏁 Appointment finished','apptDone()'],['🇨🇳 Tell Mum','mum()'],['🧭 Life Queue','queue()']]))}
function emergency(){let t='I need help communicating. I may have reduced speech, brain fog, dizziness, severe fatigue or sensory overload. Please use written communication, ask one question at a time, give extra processing time, reduce noise and pressure, and do not assume I am refusing because I cannot answer.';shell('Emergency','<div class="card out" id="help">'+t+'</div>'+grid([['Speak','say(document.getElementById("help").textContent)','danger'],['Copy','copy(document.getElementById("help").textContent)'],['Open AAC','location.href="../"','primary']]))}
function say(t){if('speechSynthesis'in window){speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.lang='en-GB';u.rate=.82;speechSynthesis.speak(u)}else alert(t)}
home();
</script></body></html>
