<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>🔎 Evidence & Open Loops</title><link rel="apple-touch-icon" href="../mellow-icon.svg"><style>body{font-family:Arial,sans-serif;margin:0 auto;max-width:760px;padding:14px 14px 90px;background:linear-gradient(180deg,#fff7f7,#fff8fc);color:#111827}.card{background:#fff;border:1px solid #d9d8ee;border-radius:18px;padding:14px;margin:10px 0}.soft{background:linear-gradient(135deg,#fff7f7,#eef7ff)}h1{font-size:25px}.icon{font-size:44px}textarea{width:100%;min-height:270px;font-family:Arial,sans-serif;font-size:15px;line-height:1.45;border-radius:14px;border:1px solid #bbb;padding:12px}button{width:100%;font-size:16px;font-weight:700;padding:12px;border-radius:14px;border:2px solid #9b111e;background:#fff7f7;color:#9b111e;margin:8px 0}.bottom{position:fixed;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(3,1fr);gap:4px;background:#fff;padding:6px;border-top:1px solid #ddd;max-width:760px;margin:auto}.bottom a{font-size:12px;padding:9px;text-align:center;text-decoration:none;color:#9b111e;border:1px solid #ddd;border-radius:12px}</style></head><body><div class="icon">🔎</div><h1>Evidence & Open Loops</h1><div class="card soft"><b>Use when:</b> a document, update, email, appointment note, or task list needs sorting.</div><div class="card"><b>Where to type:</b><p>Open ChatGPT, upload or paste the information, then paste this prompt.</p><button onclick="navigator.clipboard&&navigator.clipboard.writeText(document.querySelector('textarea').value)">Copy prompt</button><textarea>Evidence and Open Loop Manager

Please review the information I provide and sort it into a clean case-management summary.

Output:

1. Already known
- Information that repeats existing context.

2. New confirmed information
- Only facts clearly shown in the new material.

3. Needs clarification
- Anything uncertain, incomplete, or contradictory.

4. Action required
- What needs to be done, by whom, and by when.

5. Waiting for someone else
- Who owns the next action and when to chase.

6. Can wait / not urgent
- Items that should not add pressure now.

7. Suggested next step
- One smallest useful action.

8. Draft wording
- One short message if a reply or follow-up is needed.

Do not duplicate old records. Do not invent missing evidence.</textarea></div><nav class="bottom"><a href="workflows.html">Workflows</a><a href="start.html">Start</a><a href="../">Mellow</a></nav></body></html>
